body{

// ── SPRITE RENDERER ──
function px(rows,x,y,sc,flipH){
  const ox=flipH?x+rows[0].length*sc:x;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const k=row[c];if(k==='.')continue;
      const col=COL[k];if(!col)continue;
      ctx.fillStyle=col;
      const px=flipH?ox-(c+1)*sc:ox+c*sc;
      ctx.fillRect(px,y+r*sc,sc,sc);
    }
  }
}

// ── SOUND ──
function beep(freq,dur,vol,type){
  if(!audio)return;
  try{
    const o=audio.createOscillator(),g=audio.createGain();
    o.connect(g);g.connect(audio.destination);
    o.type=type||'triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+dur);
    o.start();o.stop(audio.currentTime+dur);
  }catch(e){}
}
function sndJump(){beep(220,0.15,0.12,'sine');setTimeout(()=>beep(330,0.1,0.08,'sine'),60)}
function sndCollect(){beep(520,0.08,0.15,'sine');setTimeout(()=>beep(780,0.1,0.12,'sine'),80)}
function sndDig(){beep(80,0.2,0.1,'sawtooth');setTimeout(()=>beep(60,0.2,0.1,'sawtooth'),120)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.25,0.15,'sine'),i*120))}

function doJump(){
  if(!jim.onGround)return;
  jim.vy=JUMP_VY;jim.onGround=false;
  sndJump();
  if(audio&&audio.state==='suspended')audio.resume();
}
function tryDig(){
  if(!jim.onGround)return;
  const cx=jim.x+JIM_W/2;
  for(const can of cans){
    if(can.searched)continue;
    const ccx=can.x+can.w/2;
    if(Math.abs(cx-ccx)<54&&jim.y+JIM_H>=can.y){
      jim.digging=true;jim.digTick=0;jim.digTarget=can;
      jim.vx=0;sndDig();
      if(audio&&audio.state==='suspended')audio.resume();
      return;
    }
  }
}

// ── BACKGROUND DRAW ──
function drawBg(){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,VH);
  sg.addColorStop(0,'#1a304c');sg.addColorStop(0.55,'#3a5a7a');sg.addColorStop(1,'#7a9aaa');
  ctx.fillStyle=sg;ctx.fillRect(0,0,VW,VH);

  // Overcast cloud wisps
  ctx.fillStyle='rgba(180,200,210,0.07)';
  for(let i=0;i<6;i++){
    const cx=((i*280-camX*0.015+WORLD_W)%WORLD_W)/WORLD_W*VW;
    ctx.beginPath();ctx.ellipse(cx,55+i*18,110+i*20,22+i*5,0,0,Math.PI*2);ctx.fill();
  }

  // Mount Rainier (parallax 2%)
  const rx=720-camX*0.02;
  if(rx>-150&&rx<VW+150){
    // Mountain body
    ctx.fillStyle='#3a4e60';
    ctx.beginPath();ctx.moveTo(rx,GY+10);ctx.lineTo(rx-130,GY+10);ctx.lineTo(rx-20,GY-90);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(rx-20,GY-90);ctx.lineTo(rx+140,GY+10);ctx.closePath();
    ctx.lineTo(rx,GY+10);ctx.fill();
    // Snow cap
    ctx.fillStyle='#c8d8e0';
    ctx.beginPath();ctx.moveTo(rx-20,GY-90);ctx.lineTo(rx-38,GY-62);ctx.lineTo(rx+22,GY-62);ctx.closePath();ctx.fill();
  }

  // Olympics (left, parallax 1.5%)
  ctx.fillStyle='#2a3e52';
  for(let i=0;i<6;i++){
    const mx=(-200+i*120)-camX*0.015;
    if(mx>-80&&mx<VW+80){
      const mh=50+((i*7)%35);
      ctx.beginPath();ctx.moveTo(mx,GY+10);ctx.lineTo(mx-70,GY+10);ctx.lineTo(mx-35,GY-mh);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(mx-35,GY-mh);ctx.lineTo(mx+65,GY+10);ctx.lineTo(mx,GY+10);ctx.closePath();ctx.fill();
    }
  }

  // Seattle skyline silhouette (parallax 7%)
  const sklX=300-camX*0.07;
  ctx.fillStyle='#16253a';
  // Space Needle
  const snx=sklX+460;
  if(snx>-60&&snx<VW+60){
    ctx.fillRect(snx-4,GY-76,8,50);
    ctx.beginPath();ctx.ellipse(snx,GY-76,26,9,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(snx,GY-68,22,6,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.moveTo(snx-22,GY-26);ctx.lineTo(snx-32,GY+10);ctx.lineTo(snx+32,GY+10);ctx.lineTo(snx+22,GY-26);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.moveTo(snx,GY-110);ctx.lineTo(snx-3,GY-78);ctx.lineTo(snx+3,GY-78);ctx.closePath();ctx.fill();
  }
  // City buildings
  const bldgs=[[sklX,60,45],[sklX+55,75,40],[sklX+105,52,38],[sklX+150,85,42],[sklX+200,68,35],[sklX+250,55,30],[sklX+290,80,44],[sklX+345,65,38],[sklX+395,90,50]];
  bldgs.forEach(([bx,bh,bw])=>{
    if(bx>-60&&bx<VW+60){ctx.fillRect(bx,GY-bh,bw,bh);}
  });
  // Great Wheel (parallax 5%, far right)
  const gwx=WORLD_W*0.9-camX*0.05;
  if(gwx>-80&&gwx<VW+80){
    ctx.strokeStyle='#16253a';ctx.lineWidth=5;
    ctx.beginPath();ctx.arc(gwx,GY-60,55,0,Math.PI*2);ctx.stroke();
    ctx.lineWidth=2;
    for(let a=0;a<8;a++){
      const ang=a/8*Math.PI*2;
      ctx.beginPath();ctx.moveTo(gwx,GY-60);
      ctx.lineTo(gwx+Math.cos(ang)*55,GY-60+Math.sin(ang)*55);ctx.stroke();
    }
    ctx.fillStyle='#16253a';ctx.fillRect(gwx-6,GY-5,12,5);ctx.fillRect(gwx-20,GY-62,10,57);ctx.fillRect(gwx+10,GY-62,10,57);
  }

  // Ballard houses parallax 18%
  ctx.fillStyle='#1a2a3c';
  HOUSE_WS.forEach(h=>{
    const hsx=h.x-camX*0.18;
    if(hsx+h.w+20<0||hsx-20>VW)return;
    ctx.fillRect(hsx,GY-h.h,h.w,h.h);
    ctx.beginPath();ctx.moveTo(hsx-8,GY-h.h);ctx.lineTo(hsx+h.w/2,GY-h.h-h.h*0.42);ctx.lineTo(hsx+h.w+8,GY-h.h);ctx.closePath();ctx.fill();
    if(h.w>120)ctx.fillRect(hsx+h.w*0.65,GY-h.h-h.h*0.28,10,16);
    // windows
    ctx.fillStyle='#233a54';ctx.fillRect(hsx+10,GY-h.h+12,18,15);
    if(h.w>120)ctx.fillRect(hsx+h.w-28,GY-h.h+12,18,15);
    ctx.fillStyle='#1a2a3c';
  });
}

// ── WORLD DRAW ──
function drawFence(p){
  const sx=p.x-camX;
  if(sx+p.w<-10||sx>VW+10)return;
  // Main body
  ctx.fillStyle='#7a4e2e';ctx.fillRect(sx,p.y,p.w,p.h);
  // Planks
  for(let px=sx+1;px<sx+p.w-4;px+=14){
    ctx.fillStyle='#9a6038';ctx.fillRect(px,p.y+4,12,p.h-8);
    ctx.fillStyle='#886030';ctx.fillRect(px+3,p.y+10,2,p.h-20);
    ctx.fillRect(px+7,p.y+14,2,p.h-24);
  }
  // Top + bottom rails
  ctx.fillStyle='#5a3820';ctx.fillRect(sx,p.y,p.w,5);ctx.fillRect(sx,p.y+p.h-5,p.w,5);
  // Posts
  for(let px=sx;px<=sx+p.w+1;px+=60){
    ctx.fillStyle='#4a2c18';ctx.fillRect(px-5,p.y-10,10,p.h+10);
    ctx.beginPath();ctx.moveTo(px,p.y-18);ctx.lineTo(px-5,p.y-10);ctx.lineTo(px+5,p.y-10);ctx.closePath();ctx.fill();
  }
}

function drawBranch(p){
  const sx=p.x-camX;
  if(sx+p.w<-20||sx>VW+20)return;
  ctx.fillStyle='#5a3818';ctx.fillRect(sx,p.y,p.w,p.h);
  ctx.fillStyle='#4a2c10';ctx.fillRect(sx,p.y,p.w,3);
  // Leaves on top
  ctx.fillStyle='#2a5e28';
  ctx.beginPath();ctx.ellipse(sx+p.w/2,p.y-14,p.w/2+12,18,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#3a7a34';
  ctx.beginPath();ctx.ellipse(sx+p.w/2-10,p.y-20,p.w/3,14,-0.3,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sx+p.w/2+8,p.y-18,p.w/3+5,13,0.3,0,Math.PI*2);ctx.fill();
}

function drawTree(wx){
  const sx=wx-camX;
  if(sx<-90||sx>VW+90)return;
  const h=200;
  // Trunk
  ctx.fillStyle='#5a3818';ctx.fillRect(sx-5,GY-h,10,h);
  ctx.fillStyle='#4a2c10';ctx.fillRect(sx-3,GY-h,4,h);
  // Foliage layers (fir-style)
  const tiers=[[80,h*0.82],[64,h*0.6],[50,h*0.4],[36,h*0.22]];
  tiers.forEach(([tw,ty])=>{
    const fy=GY-ty;
    ctx.fillStyle='#1e4822';
    ctx.beginPath();ctx.moveTo(sx,fy-28);ctx.lineTo(sx-tw/2,fy+16);ctx.lineTo(sx+tw/2,fy+16);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2d6430';
    ctx.beginPath();ctx.moveTo(sx,fy-22);ctx.lineTo(sx-tw/2+8,fy+16);ctx.lineTo(sx+tw/2-8,fy+16);ctx.closePath();ctx.fill();
  });
}

function drawTrashCan(can){
  const sx=can.x-camX;
  if(sx+can.w<0||sx>VW)return;
  const {w,h}=can;const y=can.y;
  if(!can.searched){
    ctx.fillStyle='#58686e';ctx.fillRect(sx+2,y+8,w-4,h-8);
    ctx.fillStyle='#48585e';
    for(let ry=y+14;ry<y+h-4;ry+=12)ctx.fillRect(sx+2,ry,w-4,2);
    ctx.fillStyle='#384850';ctx.fillRect(sx-2,y,w+4,9);ctx.fillRect(sx,y-5,w,7);
    ctx.strokeStyle='#788a90';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(sx+w/2,y-1,7,Math.PI,0);ctx.stroke();
  } else {
    ctx.fillStyle='#58686e';ctx.fillRect(sx+2,y+14,w-4,h-14);
    ctx.fillStyle='#48585e';for(let ry=y+20;ry<y+h-4;ry+=12)ctx.fillRect(sx+2,ry,w-4,2);
    ctx.save();ctx.translate(sx+2,y+9);ctx.rotate(-0.5);
    ctx.fillStyle='#384850';ctx.fillRect(0,0,w+4,9);ctx.restore();
    ctx.fillStyle='#3a2818';ctx.beginPath();ctx.ellipse(sx+w/2,y+10,12,6,0,0,Math.PI*2);ctx.fill();
  }
  // proximity hint
  if(!can.searched){
    const cx=jim.x+JIM_W/2,ccx=can.x+can.w/2;
    if(Math.abs(cx-ccx)<54&&jim.onGround&&!jim.digging){
      ctx.fillStyle='rgba(255,220,80,0.9)';ctx.font='bold 9px Courier New';ctx.textAlign='center';
      ctx.fillText('S / ⬇',sx+w/2,y-8);ctx.textAlign='left';
    }
  }
}

function drawFood(f){
  if(f.taken)return;
  const sx=f.x-camX;
  if(sx<-30||sx>VW+30)return;
  const bob=Math.sin(frame*0.07+f.x*0.008)*3;
  const fy=f.y+bob;
  switch(f.type){
    case 'fish':
      ctx.fillStyle='#88aacc';ctx.beginPath();ctx.ellipse(sx,fy-8,13,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6688aa';ctx.beginPath();ctx.moveTo(sx-13,fy-8);ctx.lineTo(sx-22,fy-14);ctx.lineTo(sx-22,fy-2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+8,fy-9,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx+9,fy-9,1.2,0,Math.PI*2);ctx.fill();
      break;
    case 'pizza':
      ctx.fillStyle='#cc8830';ctx.beginPath();ctx.moveTo(sx,fy-18);ctx.lineTo(sx-15,fy+2);ctx.lineTo(sx+15,fy+2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#dd3a1a';ctx.beginPath();ctx.moveTo(sx,fy-15);ctx.lineTo(sx-12,fy+0);ctx.lineTo(sx+12,fy+0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ffbb44';ctx.beginPath();ctx.arc(sx-3,fy-8,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+6,fy-12,2,0,Math.PI*2);ctx.fill();
      break;
    case 'apple':
      ctx.fillStyle='#bb2222';ctx.beginPath();ctx.arc(sx,fy-9,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#dd3333';ctx.beginPath();ctx.arc(sx-3,fy-10,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a3810';ctx.fillRect(sx-1,fy-21,2,7);
      ctx.fillStyle='#2a6018';ctx.beginPath();ctx.ellipse(sx+5,fy-20,6,3,0.5,0,Math.PI*2);ctx.fill();
      break;
    case 'coffee':
      ctx.fillStyle='#f0e0c8';ctx.fillRect(sx-9,fy-18,18,18);
      ctx.fillStyle='#3a2010';ctx.fillRect(sx-7,fy-14,14,10);
      ctx.strokeStyle='#f0e0c8';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(sx+12,fy-12,6,-0.9,0.9);ctx.stroke();
      ctx.strokeStyle='rgba(210,210,200,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx-2,fy-19);ctx.quadraticCurveTo(sx-5,fy-25,sx-2,fy-30);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+3,fy-19);ctx.quadraticCurveTo(sx+6,fy-25,sx+3,fy-30);ctx.stroke();
      break;
    case 'burger':
      ctx.fillStyle='#cc8830';ctx.beginPath();ctx.arc(sx,fy-14,13,Math.PI,0);ctx.fill();
      ctx.fillStyle='#dd3a1a';ctx.fillRect(sx-11,fy-11,22,4);
      ctx.fillStyle='#4a8a18';ctx.fillRect(sx-11,fy-8,22,3);
      ctx.fillStyle='#cc8830';ctx.fillRect(sx-12,fy-6,24,6);
      ctx.beginPath();ctx.arc(sx,fy-6,12,0,Math.PI);ctx.fill();
      break;
  }
}

function drawGround(){
  // Sidewalk
  ctx.fillStyle='#7a6a5a';ctx.fillRect(0,GY,VW,12);
  // Soil
  ctx.fillStyle='#3e2e20';ctx.fillRect(0,GY+12,VW,VH-GY-12);
  // Grass tufts
  ctx.fillStyle='#2e6028';
  const off=(-camX)%28;
  for(let gx=off;gx<VW;gx+=28){
    const idx=Math.floor((gx+camX)/28);
    if(idx%5===0||idx%7===2){
      ctx.fillRect(gx,GY-4,2,4);ctx.fillRect(gx+5,GY-6,2,6);ctx.fillRect(gx+10,GY-3,2,3);
    }
  }
  // Sidewalk joints
  ctx.fillStyle='#6a5a4a';
  for(let gx=(-camX)%100;gx<VW;gx+=100) ctx.fillRect(gx,GY,1,12);
}

function drawWorld(){
  // Background trees (parallax 20%)
  TREE_XS.forEach(wx=>{
    const sx=wx-camX*0.20;
    if(sx<-90||sx>VW+90)return;
    ctx.fillStyle='#1a3a20';
    const h=185;
    [[78,h*0.8],[62,h*0.6],[46,h*0.4],[32,h*0.22]].forEach(([tw,ty])=>{
      const fy=GY-ty;
      ctx.beginPath();ctx.moveTo(sx,fy-24);ctx.lineTo(sx-tw/2,fy+14);ctx.lineTo(sx+tw/2,fy+14);ctx.closePath();ctx.fill();
    });
  });

  // In-world trees (at branch positions)
  TREE_XS.forEach(wx=>drawTree(wx));
  drawGround();

  // Fences and branches
  PLATFORMS.forEach(p=>{
    if(p.type==='fence')drawFence(p);
    else if(p.type==='branch')drawBranch(p);
  });

  // Trash cans
  cans.forEach(drawTrashCan);
  // Food
  food.forEach(drawFood);
}

// ── JIMOTHY DRAW ──
function drawJim(){
  const sx=jim.x-camX;
  const sy=jim.y;
  const flip=jim.facing<0;

  if(jim.digging){
    // Show upside-down (diving into can)
    ctx.save();
    const dig_offset=Math.min(jim.digTick*0.4,JIM_H*0.65);
    ctx.translate(sx+JIM_W/2,sy+JIM_H/2);ctx.scale(flip?-1:1,1);
    px(JDG,-JIM_W/2,-JIM_H/2+dig_offset,SC);
    ctx.restore();
    return;
  }

  let sprite;
  if(!jim.onGround) sprite=JJP;
  else if(jim.vx!==0) sprite=(jim.walkFrame===0?JW1:JW2);
  else sprite=JW1;

  ctx.save();
  ctx.translate(sx+JIM_W/2,0);
  ctx.scale(flip?-1:1,1);
  px(sprite,-JIM_W/2,sy,SC);
  ctx.restore();
}

// ── HUD ──
function drawHUD(){
  // Score
  document.getElementById('scoretxt').textContent=`🍖 ${score} bites`;

  // Collected / total
  const got=food.filter(f=>f.taken).length+cans.filter(c=>c.searched).length;
  const tot=food.length+cans.length;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(6,6,170,28);
  ctx.fillStyle='#ffcc44';ctx.font='bold 10px Courier New';
  ctx.fillText(`found ${got}/${tot}`,12,22);

  // Popups
  popups=popups.filter(p=>{
    p.y+=p.vy;p.alpha-=0.022;
    if(p.alpha<=0)return false;
    ctx.fillStyle=`rgba(255,220,60,${p.alpha})`;
    ctx.font='bold 12px Courier New';ctx.textAlign='center';
    ctx.fillText(p.text,p.x-camX,p.y);ctx.textAlign='left';
    return true;
  });

  // Win message
  if(won){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(VW/2-220,VH/2-50,440,100);
    ctx.fillStyle='#ffcc44';ctx.font='bold 20px Courier New';ctx.textAlign='center';
    ctx.fillText('🦝 Jimothy is FULL! Great scavenge! 🦝',VW/2,VH/2-10);
    ctx.fillStyle='#88bbff';ctx.font='12px Courier New';
    ctx.fillText(`Total: ${score} bites  |  Press SPACE to play again`,VW/2,VH/2+22);
    ctx.textAlign='left';
  }

  // Controls reminder (fades after 8s)
  if(frame<480){
    const a=Math.max(0,(480-frame)/180);
    ctx.fillStyle=`rgba(120,180,255,${a*0.9})`;ctx.font='11px Courier New';ctx.textAlign='center';
    ctx.fillText('← → to move  |  SPACE to jump  |  S near trash to rummage',VW/2,VH-12);
    ctx.textAlign='left';
  }
}

// ── PHYSICS ──
function update(){
  frame++;

  // Win → only listen for restart
  if(won){
    if(keys['Space']||mob.j)init();
    return;
  }

  // Digging
  if(jim.digging){
    jim.digTick++;
    if(jim.digTick>=80){
      const pts=12+Math.floor(Math.random()*18);
      score+=pts;
      popups.push({x:jim.digTarget.x+jim.digTarget.w/2,y:jim.digTarget.y-10,text:`+${pts} bites!`,alpha:1,vy:-1.4});
      jim.digTarget.searched=true;
      jim.digging=false;jim.digTarget=null;
      sndCollect();
    }
    return;
  }

  // Horizontal input
  const left=keys['ArrowLeft']||keys['KeyA']||mob.l;
  const right=keys['ArrowRight']||keys['KeyD']||mob.r;
  const jumpPressed=keys['Space']||keys['ArrowUp']||keys['KeyW']||mob.j;
  const digPressed=keys['ArrowDown']||keys['KeyS']||mob.d;

  if(left){jim.vx=Math.max(jim.vx-1.2,-WALK_SPD);}
  else if(right){jim.vx=Math.min(jim.vx+1.2,WALK_SPD);}
  else{jim.vx*=0.72;}
  if(Math.abs(jim.vx)<0.1)jim.vx=0;

  if(jim.vx<0)jim.facing=-1;
  else if(jim.vx>0)jim.facing=1;

  // Walk animation
  if(jim.onGround&&jim.vx!==0){
    jim.walkTick++;
    if(jim.walkTick>=8){jim.walkTick=0;jim.walkFrame^=1;}
  }

  // Jump
  if(jumpPressed&&jim.onGround&&!jim.jumpHeld){
    doJump();jim.jumpHeld=true;
  }
  if(!jumpPressed)jim.jumpHeld=false;

  // Dig
  if(digPressed&&!jim.digHeld){jim.digHeld=true;tryDig();}
  if(!digPressed)jim.digHeld=false;

  // Gravity
  jim.vy+=GRAVITY;

  // Move
  const prevY=jim.y;
  jim.x+=jim.vx;
  jim.y+=jim.vy;

  // World bounds
  if(jim.x<0){jim.x=0;jim.vx=0;}
  if(jim.x+JIM_W>WORLD_W){jim.x=WORLD_W-JIM_W;jim.vx=0;}

  // Platform collisions
  jim.onGround=false;
  PLATFORMS.forEach(p=>{
    // Top landing
    if(jim.x+JIM_W>p.x&&jim.x<p.x+p.w){
      if(prevY+JIM_H<=p.y&&jim.y+JIM_H>p.y&&jim.vy>0){
        jim.y=p.y-JIM_H;jim.vy=0;jim.onGround=true;
      }
    }
    // Side blocking (only for fences, not branches/ground)
    if(p.type==='fence'&&jim.y+JIM_H>p.y){
      // Left wall
      if(jim.x+JIM_W>p.x&&jim.x+JIM_W<p.x+8&&jim.vx>0){jim.x=p.x-JIM_W;jim.vx=0;}
      // Right wall
      if(jim.x<p.x+p.w&&jim.x>p.x+p.w-8&&jim.vx<0){jim.x=p.x+p.w;jim.vx=0;}
    }
  });

  // Fell below world
  if(jim.y>GY+100){jim.y=GY-JIM_H;jim.vy=0;jim.onGround=true;}

  // Food collection
  const jcx=jim.x+JIM_W/2,jcy=jim.y+JIM_H/2;
  food.forEach(f=>{
    if(f.taken)return;
    const dx=jcx-f.x,dy=jcy-f.y;
    if(Math.sqrt(dx*dx+dy*dy)<32){
      f.taken=true;score+=f.pts;
      popups.push({x:f.x,y:f.y-10,text:`+${f.pts}`,alpha:1,vy:-1.6});
      sndCollect();
      if(audio&&audio.state==='suspended')audio.resume();
    }
  });

  // Camera
  const targetCamX=jim.x-VW*0.35;
  camX+=(targetCamX-camX)*0.1;
  camX=Math.max(0,Math.min(WORLD_W-VW,camX));

  // Win check
  const allFood=food.every(f=>f.taken);
  const allCans=cans.every(c=>c.searched);
  if(allFood&&allCans&&!won){won=true;sndWin();}
}

// ── LOOP ──
function loop(){
  update();
  drawBg();
  drawWorld();
  drawJim();
  drawHUD();
  requestAnimationFrame(loop);
}

// ── INIT ──
function init(){
  food=FOOD_DEFS.map(f=>({...f,taken:false}));
  cans=CAN_DEFS.map(c=>({...c,searched:false}));
  jim={x:140,y:GY-JIM_H,vx:0,vy:0,onGround:true,facing:1,
       walkTick:0,walkFrame:0,digging:false,digTick:0,digTarget:null,
       jumpHeld:false,digHeld:false};
  camX=0;score=0;popups=[];frame=0;won=false;
}

// ── MOBILE ──
function setupMobile(){
  if(!('ontouchstart' in window||navigator.maxTouchPoints>0))return;
  document.getElementById('mob').style.display='flex';
  document.getElementById('hint').style.display='none';

  function hold(id,prop){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();mob[prop]=true;
      if(audio&&audio.state==='suspended')audio.resume();},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();mob[prop]=false;},{passive:false});
    el.addEventListener('touchcancel',()=>{mob[prop]=false;});
  }
  hold('btn-l','l');hold('btn-r','r');hold('btn-j','j');hold('btn-d','d');
}

setupMobile();
init();
requestAnimationFrame(loop);
</script>
