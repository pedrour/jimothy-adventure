// ── SPRITE RENDERER ──
function px(rows,x,y,sc,flipH){
  const ox=flipH?x+rows[0].length*sc:x;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const k=row[c];if(k==='.')continue;
      const col=COL[k];if(!col)continue;
      ctx.fillStyle=col;
      const px=flipH?ox-(c+1)*sc:ox+c*sc;
      ctx.fillRect(px,y+r*sc,sc,sc);
    }
  }
}

// ── SOUND ──
function beep(freq,dur,vol,type){
  if(!audio)return;
  try{
    const o=audio.createOscillator(),g=audio.createGain();
    o.connect(g);g.connect(audio.destination);
    o.type=type||'triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+dur);
    o.start();o.stop(audio.currentTime+dur);
  }catch(e){}
}

}

function bgMusicLoop(){
  if(!bgMusicPlaying||!audio)return;
  const now=audio.currentTime;
  const LOOP=16.0;

  const mg=audio.createGain();

    g.gain.setValueAtTime(0,now+t);
    g.gain.linearRampToValueAtTime(vol,now+t+0.018);
    g.gain.setValueAtTime(vol,now+t+dur*0.60);
    g.gain.exponentialRampToValueAtTime(0.0001,now+t+dur+0.05);
    o.connect(g);g.connect(mg);o.start(now+t);o.stop(now+t+dur+0.09);
  }

  // G major, 120 BPM, 4/4 — 8 bars × 2s = 16s loop

  // Short melody notes = steel-drum / marimba texture; sine bass = warm & smooth

  // G3=196 A3=220 B3=247 C3=131 D3=147 E3=165 F#3=185

    [494,2.50,E],[523,2.75,E],              // B4 C5
    [587,3.00,Q],[494,3.50,Q],              // D5 B4
    // Bar 3 (C, 4–6s): rise and cascade

    [784,5.00,E],[659,5.25,E],[523,5.50,Q],// G5 E5 C5

    // Bar 5 (G, 8–10s): variation — descends from G5 all the way to G4
    [784,8.00,E],[880,8.25,E],[784,8.50,E],[659,8.75,E],// G5 A5 G5 E5
    [587,9.00,E],[494,9.25,E],[392,9.50,Q],             // D5 B4 G4
    // Bar 6 (Em, 10–12s): climb back up through Em

    [659,11.00,E],[784,11.25,E],[659,11.50,Q], // E5 G5 E5

function sndVictory80s(){
  if(!audio)return;
  const now=audio.currentTime;
  const mg=audio.createGain();mg.gain.setValueAtTime(0.20,now);mg.connect(audio.destination);
  function n(freq,t,dur,wave,vol,vib){
    const o=audio.createOscillator(),g=audio.createGain();
    o.type=wave||'square';o.frequency.setValueAtTime(freq,now+t);
    if(vib){const lf=audio.createOscillator(),lg=audio.createGain();
      lf.frequency.setValueAtTime(5.5,now+t);lg.gain.setValueAtTime(vib,now+t);
      lf.connect(lg);lg.connect(o.frequency);lf.start(now+t+0.12);lf.stop(now+t+dur);}
    g.gain.setValueAtTime(0,now+t);g.gain.linearRampToValueAtTime(vol||1,now+t+0.025);
    g.gain.setValueAtTime(vol||1,now+t+dur*0.65);g.gain.exponentialRampToValueAtTime(0.001,now+t+dur+0.08);
    o.connect(g);g.connect(mg);o.start(now+t);o.stop(now+t+dur+0.12);
  }
  // ── Lead melody (square wave, 80s synth) ──
  [[392,0.00,0.13],[392,0.16,0.13],[392,0.32,0.13],        // G4 G4 G4  (fanfare)
   [523,0.48,0.32],                                          // C5
   [659,0.88,0.22],[587,1.14,0.18],[523,1.36,0.28],         // E5 D5 C5
   [523,1.72,0.10],[659,1.85,0.10],[784,1.98,0.10],         // run up
   [1047,2.12,0.46,,,7],                                     // C6! (vibrato)
   [988,2.66,0.20],[880,2.90,0.20],[784,3.14,0.40,,,5],     // B5 A5 G5
   [880,3.62,0.12],[784,3.78,0.12],[659,3.94,0.12],[784,4.10,0.12],// A5 G5 E5 G5
   [880,4.28,0.12],[784,4.44,0.22],[659,4.70,0.22],         // A5 G5 E5
   [523,4.98,0.26],                                          // C5
   [523,5.30,0.09],[659,5.42,0.09],[784,5.54,0.09],[1047,5.66,0.09],[1319,5.80,0.09], // arp!
   [1047,5.96,1.00,,,12]                                     // C6 final (big vibrato)
  ].forEach(([f,t,d,w,v,vb])=>n(f,t,d,w,v||1,vb));
  // ── Bass (sawtooth) ──
  [[131,0.00,0.70],[131,0.85,0.62],
   [196,1.52,0.60],[175,2.18,0.55],
   [196,2.78,0.22],[131,3.05,0.62],[131,3.72,0.60],
   [196,4.38,0.60],[175,5.04,0.52],
   [220,5.62,0.48],[196,6.16,0.50],[131,6.72,1.30]
  ].forEach(([f,t,d])=>n(f,t,d,'sawtooth',0.55));
  // ── Arpeggio chimes (triangle) ──
  [523,659,784,1047,784,659,523,659,784,1047,784,659,
   523,659,784,1047,880,1047,1175,1397,1047,880,784,880,
   1047,1319,1047,880,1047,1319,1047,880
  ].forEach((f,i)=>n(f,i*0.145,0.13,'triangle',0.16));
  // ── Loop after ~8s if still winning ──
  setTimeout(()=>{if(won)sndVictory80s();},8200);
}

function doJump(){
  if(!jim.onGround)return;
  jim.vy=JUMP_VY;jim.onGround=false;
  sndJump();
  if(audio&&audio.state==='suspended')audio.resume();
}
function tryDig(){
  if(!jim.onGround)return;
  const cx=jim.x+JIM_W/2;
  for(const can of cans){
    if(can.searched)continue;
    const ccx=can.x+can.w/2;
    if(Math.abs(cx-ccx)<54&&jim.y+JIM_H>=can.y){
      jim.digging=true;jim.digTick=0;jim.digTarget=can;
      jim.vx=0;sndLoot();
      if(audio&&audio.state==='suspended')audio.resume();
      return;
    }
  }
}

  // ── SEATTLE LANDMARKS (all parallax 6%, staggered anchors = different screen times) ──

  // DOWNTOWN SKYLINE + SPACE NEEDLE — anchor centre, visible first 3/4 of game
  const snX=VW*0.5-camX*0.06;
  if(snX>-450&&snX<VW+450){

    // ── SPACE NEEDLE — REAL COLOURS ──

      // A-frame legs — Astronaut White
      ctx.fillStyle='#D8D4C8';
      ctx.beginPath();ctx.moveTo(-62,nBase-2);ctx.bezierCurveTo(-54,nBase-42,-24,legJY+28,-5,legJY);ctx.lineTo(-2,legJY+10);ctx.bezierCurveTo(-22,legJY+36,-46,nBase-34,-54,nBase+3);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(62,nBase-2);ctx.bezierCurveTo(54,nBase-42,24,legJY+28,5,legJY);ctx.lineTo(2,legJY+10);ctx.bezierCurveTo(22,legJY+36,46,nBase-34,54,nBase+3);ctx.closePath();ctx.fill();
      ctx.fillStyle='#C0BCB0';ctx.fillRect(-3,legJY,6,nBase-legJY);
      // Column — white shaft
      const cg2=ctx.createLinearGradient(-5,0,5,0);

      ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(0,antY+14);ctx.lineTo(0,antY);ctx.stroke();
      ctx.fillStyle='#FF2222';ctx.beginPath();ctx.arc(0,antY,4,0,Math.PI*2);ctx.fill();

  // GREAT WHEEL — REAL COLOURS, anchor right of downtown
  const gwX=370-camX*0.06;
  if(gwX>-160&&gwX<VW+160){
    const gwr=62,gwCY=GY-gwr-14;
    ctx.save();ctx.translate(gwX,0);

    ctx.fillStyle='#D8D4CC';ctx.beginPath();ctx.arc(0,gwCY,3,0,Math.PI*2);ctx.fill();

  if(false){ // Fremont Troll removed
  const ftX=570-camX*0.06;
  if(ftX>-260&&ftX<VW+210){
    ctx.save();ctx.translate(ftX,GY);
    // Aurora Bridge
    ctx.strokeStyle='#607880';ctx.lineWidth=9;

    // Troll body — ferrocement gray

    tg.addColorStop(0,'#9E9C94');tg.addColorStop(0.5,'#7A7872');tg.addColorStop(1,'#484644');

    ctx.fillStyle='#7C7A72';

    ctx.bezierCurveTo(-88,-185,-70,-182,-60,-168);

    ctx.bezierCurveTo(-42,-92,-48,-82,-58,-80);

    // Knuckles / clawed fingers at the top of the raised arm

    // Nose ridge

    // Grimace mouth
    ctx.strokeStyle='#484644';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(-15,-94);ctx.bezierCurveTo(-4,-89,18,-89,30,-94);ctx.stroke();
    ctx.fillStyle='#C8C4BC';[[-11,-95],[-3,-95],[8,-95],[19,-95]].forEach(([tx,ty])=>{ctx.fillRect(tx,ty,6,6);});
    // LEFT EYE = HUBCAP (the troll's iconic chrome eye)
    ctx.fillStyle='#8888A0';ctx.beginPath();ctx.arc(-16,-115,16,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#B8B8CC';ctx.beginPath();ctx.arc(-16,-115,12,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#DCDCE8';ctx.beginPath();ctx.arc(-16,-115,7,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.85)';ctx.beginPath();ctx.arc(-20,-120,3,0,Math.PI*2);ctx.fill();
    // Right eye — dark socket
    ctx.fillStyle='#303030';ctx.beginPath();ctx.ellipse(28,-114,12,11,0.1,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#181818';ctx.beginPath();ctx.ellipse(28,-114,6,6,0,0,Math.PI*2);ctx.fill();
    // Brow
    ctx.strokeStyle='#686660';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-34,-126);ctx.bezierCurveTo(-12,-135,10,-131,24,-126);ctx.stroke();

    [[-24,-144,-32,-162],[-10,-147,-14,-166],[6,-146,10,-164],[22,-142,28,-159]].forEach(([x1,y1,x2,y2])=>{

    ctx.fillStyle='rgba(160,210,250,0.65)';ctx.fillRect(-17,-11,11,9);ctx.fillRect(-3,-11,11,9);

    ctx.fillStyle='#FFFACC';ctx.beginPath();ctx.ellipse(22,1,4,3,0,0,Math.PI*2);ctx.fill();
    // Wheels
    ctx.fillStyle='#303840';ctx.beginPath();ctx.arc(-15,10,6,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(14,10,6,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#888';ctx.beginPath();ctx.arc(-15,10,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(14,10,3,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.restore();

  // BALLARD BUILDINGS near background (parallax 20%)
  const bgOff=-camX*0.20;

}

// ── WORLD DRAW ──
function drawFence(p){
  const sx=p.x-camX;
  if(sx+p.w<-10||sx>VW+10)return;

  // Shadow under fence
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.fillRect(sx+4,p.y+p.h-3,p.w,6);

  // Posts first (behind boards)
  for(let px=sx;px<=sx+p.w+2;px+=58){
    // Post body — weathered cedar, slightly darker than boards
    ctx.fillStyle='#4e3018';ctx.fillRect(px-6,p.y-14,12,p.h+14);
    // Post grain
    ctx.fillStyle='#3e2410';ctx.fillRect(px-4,p.y-8,3,p.h+6);
    ctx.fillRect(px+1,p.y-4,2,p.h+2);
    // Post cap (pointed)
    ctx.fillStyle='#3e2410';
    ctx.beginPath();ctx.moveTo(px,p.y-22);ctx.lineTo(px-6,p.y-14);ctx.lineTo(px+6,p.y-14);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5e3820';
    ctx.beginPath();ctx.moveTo(px,p.y-20);ctx.lineTo(px-4,p.y-14);ctx.lineTo(px+4,p.y-14);ctx.closePath();ctx.fill();
  }

  // Horizontal rails (behind boards)
  ctx.fillStyle='#5a3820';ctx.fillRect(sx,p.y+4,p.w,8); // top rail
  ctx.fillRect(sx,p.y+p.h-12,p.w,8); // bottom rail
  ctx.fillStyle='#4a2e16';ctx.fillRect(sx,p.y+4,p.w,2); // rail shadow top
  ctx.fillRect(sx,p.y+p.h-12,p.w,2);

  // Vertical boards (cedar planks)
  for(let bx=sx+2;bx<sx+p.w-4;bx+=14){
    // Main board — weathered gray-brown cedar
    ctx.fillStyle='#8a5e38';ctx.fillRect(bx,p.y+2,12,p.h-4);
    // Board highlight (left edge catches light)
    ctx.fillStyle='#9a6840';ctx.fillRect(bx,p.y+2,3,p.h-4);
    // Board shadow (right edge)
    ctx.fillStyle='#6a4828';ctx.fillRect(bx+10,p.y+2,2,p.h-4);
    // Wood grain lines
    ctx.fillStyle='#7a5230';
    ctx.fillRect(bx+4,p.y+10,1,p.h-20);
    ctx.fillRect(bx+8,p.y+16,1,p.h-30);
    // Knot in wood (occasionally)
    if(Math.floor((bx-sx)/14)%5===2){
      ctx.fillStyle='#5a3a20';
      ctx.beginPath();ctx.ellipse(bx+6,p.y+p.h*0.4,4,3,0,0,Math.PI*2);ctx.fill();
    }
  }
}

function drawBranch(p){
  const sx=p.x-camX;
  if(sx+p.w<-30||sx>VW+30)return;
  const cx=sx+p.w/2;
  // Leaf canopy (drawn behind branch bark)
  ctx.fillStyle='#1e4820';
  ctx.beginPath();ctx.ellipse(cx,p.y-20,p.w/2+22,28,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#286a28';

// ── PHYSICS ──
function update(){
  frame++;
  // Auto-start bg music as soon as audio context is unlocked
  if(!bgMusicPlaying&&!won&&audio&&audio.state==='running')startBgMusic();

  // Win → animate and restart after brief delay
  if(won){
    winFrame++;
    if(winFrame===160)document.getElementById('share-btn').style.display='block';
    if(winFrame>160&&(keys['Space']||mob.j))init();
    return;
  }

  // Digging
  if(jim.digging){
    jim.digTick++;
    if(jim.digTick>=80){
      const pts=12+Math.floor(Math.random()*18);
      score+=pts;
      popups.push({x:jim.digTarget.x+jim.digTarget.w/2,y:jim.digTarget.y-10,text:`+${pts} bites!`,alpha:1,vy:-1.4});
      jim.digTarget.searched=true;
      jim.digging=false;jim.digTarget=null;
      sndCollect();
    }
    return;
  }

  // Horizontal input
  const left=keys['ArrowLeft']||keys['KeyA']||mob.l;
  const right=keys['ArrowRight']||keys['KeyD']||mob.r;
  const jumpPressed=keys['Space']||keys['ArrowUp']||keys['KeyW']||mob.j;
  const digPressed=keys['ArrowDown']||keys['KeyS']||mob.d;

  if(left){jim.vx=Math.max(jim.vx-1.8,-WALK_SPD);}
  else if(right){jim.vx=Math.min(jim.vx+1.8,WALK_SPD);}
  else{jim.vx*=0.72;}
  if(Math.abs(jim.vx)<0.1)jim.vx=0;

  if(jim.vx<0)jim.facing=-1;
  else if(jim.vx>0)jim.facing=1;

  // Walk animation
  if(jim.onGround&&jim.vx!==0){
    jim.walkTick++;
    if(jim.walkTick>=8){jim.walkTick=0;jim.walkFrame^=1;}
  }

  // Jump
  if(jumpPressed&&jim.onGround&&!jim.jumpHeld){
    doJump();jim.jumpHeld=true;
  }
  if(!jumpPressed)jim.jumpHeld=false;

  // Dig
  if(digPressed&&!jim.digHeld){jim.digHeld=true;tryDig();}
  if(!digPressed)jim.digHeld=false;

  // Gravity
  jim.vy+=GRAVITY;

  // Move
  const prevY=jim.y;
  jim.x+=jim.vx;
  jim.y+=jim.vy;

  // World bounds
  if(jim.x<0){jim.x=0;jim.vx=0;}
  if(jim.x+JIM_W>WORLD_W){jim.x=WORLD_W-JIM_W;jim.vx=0;}

  // Platform collisions
  jim.onGround=false;
  PLATFORMS.forEach(p=>{
    // Top landing
    if(jim.x+JIM_W>p.x&&jim.x<p.x+p.w){
      if(prevY+JIM_H<=p.y&&jim.y+JIM_H>p.y&&jim.vy>0){
        jim.y=p.y-JIM_H;jim.vy=0;jim.onGround=true;
      }
    }
    // Side blocking (only for fences, not branches/ground)
    if(p.type==='fence'&&jim.y+JIM_H>p.y){
      // Left wall
      if(jim.x+JIM_W>p.x&&jim.x+JIM_W<p.x+8&&jim.vx>0){jim.x=p.x-JIM_W;jim.vx=0;}
      // Right wall
      if(jim.x<p.x+p.w&&jim.x>p.x+p.w-8&&jim.vx<0){jim.x=p.x+p.w;jim.vx=0;}
    }
  });

  // Fell below world
  if(jim.y>GY+100){jim.y=GY-JIM_H;jim.vy=0;jim.onGround=true;}

  // Food collection
  const jcx=jim.x+JIM_W/2,jcy=jim.y+JIM_H/2;
  food.forEach(f=>{
    if(f.taken)return;
    const dx=jcx-f.x,dy=jcy-f.y;
    if(Math.sqrt(dx*dx+dy*dy)<32){
      f.taken=true;score+=f.pts;
      popups.push({x:f.x,y:f.y-10,text:`+${f.pts}`,alpha:1,vy:-1.6});
      sndCollect();
      if(audio&&audio.state==='suspended')audio.resume();
    }
  });

  // Camera
  const targetCamX=jim.x-VW*0.35;
  camX+=(targetCamX-camX)*0.1;
  camX=Math.max(0,Math.min(WORLD_W-VW,camX));

  // Win check
  const allFood=food.every(f=>f.taken);
  const allCans=cans.every(c=>c.searched);
  if(allFood&&allCans&&!won){won=true;stopBgMusic();sndVictory80s();}
}

// ── RUMMAGE ANIMATION ──
function drawRummageAnim(sx,sy,flip){
  const can=jim.digTarget;
  const csx=can.x-camX;
  const t=jim.digTick;

  // Jimothy bouncing next to can, facing it
  const bob=Math.sin(t*0.28)*7;
  ctx.save();
  ctx.translate(sx+JIM_W/2,0);
  ctx.scale(flip?-1:1,1);
  px(t%18<9?JW1:JW2,-JIM_W/2,sy+bob,SC);
  ctx.restore();

  // Colourful sparkle burst expanding from can top
  const SPARK=['#ffee44','#ff9922','#44ffbb','#ff66cc','#66ddff','#ffaa44','#88ff66','#ff4488'];
  for(let i=0;i<8;i++){
    const a=(i/8)*Math.PI*2-Math.PI/2;
    const r=Math.min(t*1.8,55);
    const px2=csx+can.w/2+Math.cos(a)*r;
    const py2=can.y-6+Math.sin(a)*r*0.6;
    const alpha=Math.max(0,(1-t/65)*(0.85+0.15*Math.sin(t*0.5+i)));
    ctx.fillStyle=SPARK[i];ctx.globalAlpha=alpha;
    ctx.beginPath();ctx.arc(px2,py2,4.5,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  // Emojis floating up out of can
  const EMOJIS=['🍖','⭐','💰','✨'];
  EMOJIS.forEach((em,i)=>{
    const st=i*14;
    if(t>st&&t<st+52){
      const p=(t-st)/52;
      ctx.globalAlpha=1-p;
      ctx.font='18px sans-serif';ctx.textAlign='center';
      ctx.fillText(em,csx+can.w/2+(i-1.5)*18,can.y-6-p*58);
      ctx.textAlign='left';ctx.globalAlpha=1;
    }
  });
}

}

// ── ORCA ──
function drawOrca(cx,cy,flip,t){
  ctx.save();ctx.translate(cx,cy);if(flip)ctx.scale(-1,1);
  const bob=Math.sin(t*0.13+cx*0.01)*14;
  const tw=Math.sin(t*0.22)*24;
  const tilt=Math.sin(t*0.11)*0.16;
  ctx.rotate(tilt);
  // Body (main black ellipse)
  ctx.fillStyle='#0d0d0d';
  ctx.beginPath();ctx.ellipse(0,bob,46,23,0,0,Math.PI*2);ctx.fill();
  // White belly
  ctx.fillStyle='#efefef';
  ctx.beginPath();ctx.ellipse(9,bob+8,26,14,0.1,0,Math.PI);ctx.fill();
  // White saddle patch
  ctx.beginPath();ctx.ellipse(-14,bob-6,16,9,0.25,0,Math.PI*2);ctx.fill();
  // White eye patch
  ctx.beginPath();ctx.ellipse(32,bob-9,12,9,0.4,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#181818';ctx.beginPath();ctx.arc(34,bob-10,3.5,0,Math.PI*2);ctx.fill();
  // Dorsal fin (tall – the orca's signature)
  ctx.fillStyle='#080808';
  ctx.beginPath();
  ctx.moveTo(-9,bob-21);
  ctx.bezierCurveTo(-12,bob-62,-4,bob-74,0,bob-76);
  ctx.bezierCurveTo(4,bob-66,8,bob-45,10,bob-23);
  ctx.closePath();ctx.fill();
  // Neon glow on dorsal fin edge
  const hue=(t*3+cx*2)%360;
  ctx.save();ctx.shadowColor=`hsl(${hue},100%,60%)`;ctx.shadowBlur=14;
  ctx.strokeStyle=`hsl(${hue},100%,70%)`;ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(-9,bob-21);
  ctx.bezierCurveTo(-12,bob-62,-4,bob-74,0,bob-76);ctx.stroke();
  ctx.restore();
  // Pectoral fin
  ctx.fillStyle='#111';
  ctx.beginPath();ctx.moveTo(16,bob+10);
  ctx.quadraticCurveTo(22,bob+32,12,bob+38);
  ctx.quadraticCurveTo(5,bob+26,12,bob+12);ctx.closePath();ctx.fill();
  // Upper tail fluke
  ctx.fillStyle='#0c0c0c';
  ctx.beginPath();ctx.moveTo(-40,bob+4);
  ctx.quadraticCurveTo(-56,bob-6+tw,-68,bob-16+tw);
  ctx.quadraticCurveTo(-63,bob-2+tw,-54,bob+4+tw);
  ctx.quadraticCurveTo(-47,bob+8,-40,bob+4);ctx.closePath();ctx.fill();
  // Lower tail fluke
  ctx.beginPath();ctx.moveTo(-40,bob+6);
  ctx.quadraticCurveTo(-54,bob+16+tw,-66,bob+22+tw);
  ctx.quadraticCurveTo(-61,bob+8+tw,-52,bob+4+tw);
  ctx.quadraticCurveTo(-46,bob+8,-40,bob+6);ctx.closePath();ctx.fill();
  // Rainbow splash rings
  for(let i=0;i<3;i++){
    const sh=(winFrame*5+i*120+cx)%360;
    const sr=52+i*24+Math.sin(t*0.18+i)*10;
    ctx.strokeStyle=`hsla(${sh},100%,65%,${0.26-i*0.07})`;ctx.lineWidth=2;
    ctx.beginPath();ctx.arc(0,bob,sr,0,Math.PI*2);ctx.stroke();
  }
  ctx.restore();
}

// ── SEATTLE GREAT WHEEL ──
function drawGreatWheel(cx,base,frame){
  const r=56;
  const axleY=base-r-28;

  // Support A-frame
  ctx.fillStyle='#D0CCCA';
  ctx.beginPath();ctx.moveTo(cx-r*0.68,base);ctx.lineTo(cx-4,axleY);ctx.lineTo(cx+4,axleY);ctx.lineTo(cx-r*0.68+12,base);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.moveTo(cx+r*0.68,base);ctx.lineTo(cx-4,axleY);ctx.lineTo(cx+4,axleY);ctx.lineTo(cx+r*0.68-12,base);ctx.closePath();ctx.fill();
  // Cross brace
  ctx.strokeStyle='#C8C4BC';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(cx-r*0.5,base-26);ctx.lineTo(cx+r*0.5,base-26);ctx.stroke();

  // Pier base
  ctx.fillStyle='#8A9090';ctx.fillRect(cx-r*0.72,base-8,r*1.44,10);

  // Spokes (16)
  const rot=frame*0.010;
  ctx.strokeStyle='#C4C0B8';ctx.lineWidth=1.8;
  for(let i=0;i<16;i++){
    const a=rot+(i/16)*Math.PI*2;
    ctx.beginPath();ctx.moveTo(cx,axleY);ctx.lineTo(cx+Math.cos(a)*r,axleY+Math.sin(a)*r);ctx.stroke();
  }
  // Outer rim
  ctx.strokeStyle='#D0CCC4';ctx.lineWidth=5;
  ctx.beginPath();ctx.arc(cx,axleY,r,0,Math.PI*2);ctx.stroke();
  // Inner ring
  ctx.strokeStyle='#C0BCB4';ctx.lineWidth=2.5;
  ctx.beginPath();ctx.arc(cx,axleY,r*0.62,0,Math.PI*2);ctx.stroke();

  // LED glow
  const lh=(frame*3)%360;
  ctx.save();ctx.shadowColor=`hsl(${lh},100%,65%)`;ctx.shadowBlur=14;
  ctx.strokeStyle=`hsla(${lh},100%,72%,0.9)`;ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(cx,axleY,r+3,0,Math.PI*2);ctx.stroke();
  ctx.restore();

  // Gondolas (20, colourful, rotating)
  for(let i=0;i<20;i++){
    const a=rot+(i/20)*Math.PI*2;
    const gx=cx+Math.cos(a)*r;const gy=axleY+Math.sin(a)*r;
    const gh=(i*18+frame*2)%360;
    ctx.fillStyle=`hsl(${gh},72%,68%)`;
    ctx.beginPath();ctx.roundRect(gx-5,gy,10,8,2);ctx.fill();
    ctx.strokeStyle='#B8B4AC';ctx.lineWidth=1;
    ctx.beginPath();ctx.moveTo(gx,gy);ctx.lineTo(gx,gy-4);ctx.stroke();
  }
  // Hub
  ctx.fillStyle='#B4B0A8';ctx.beginPath();ctx.arc(cx,axleY,9,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#D8D4CC';ctx.beginPath();ctx.arc(cx,axleY,4,0,Math.PI*2);ctx.fill();
}

// ── PIKE PLACE MARKET ──
function drawPikePlace(cx,base,frame){
  // Building facade — warm red brick
  ctx.fillStyle='#7A5038';ctx.fillRect(cx-60,base-110,120,110);
  ctx.fillStyle='rgba(0,0,0,0.12)';for(let r=0;r<8;r++) ctx.fillRect(cx-60,base-110+r*14,120,2);
  // Mortar lines (vertical stagger)
  ctx.fillStyle='rgba(0,0,0,0.07)';
  for(let r=0;r<8;r++){const off=r%2*15;for(let c=0;c<5;c++) ctx.fillRect(cx-60+off+c*24,base-110+r*14,1,14);}
  // Warm windows (2 rows × 3)
  for(let row=0;row<2;row++) for(let col=0;col<3;col++){
    const wx=cx-44+col*30,wy=base-102+row*44;
    ctx.fillStyle='#FFD870';ctx.fillRect(wx,wy,18,24);
    ctx.fillStyle='rgba(80,40,10,0.45)';ctx.fillRect(wx+8,wy,2,24);ctx.fillRect(wx,wy+11,18,2);
  }

  // ── THE SIGN (left slab) + CLOCK (right, same height) ──
  // The real sign: dark iron arch/frame, three stacked red neon word panels, tall round clock to the right
  const sigL=cx-62,sigT=base-220,sigW=90,sigH=95;
  // Iron arch top
  ctx.fillStyle='#1C1208';
  ctx.beginPath();ctx.moveTo(sigL-4,sigT+16);ctx.bezierCurveTo(sigL-4,sigT-4,sigL+sigW+4,sigT-4,sigL+sigW+4,sigT+16);ctx.lineTo(sigL+sigW+4,sigT+8);ctx.lineTo(sigL-4,sigT+8);ctx.closePath();ctx.fill();
  // Iron sign backing
  ctx.fillStyle='#1A1006';ctx.fillRect(sigL,sigT,sigW,sigH);
  // Warm glow halo behind sign
  ctx.save();
  const halo=ctx.createRadialGradient(sigL+sigW/2,sigT+sigH/2,10,sigL+sigW/2,sigT+sigH/2,100);
  halo.addColorStop(0,'rgba(255,50,10,0.20)');halo.addColorStop(1,'rgba(255,50,10,0)');
  ctx.fillStyle=halo;ctx.fillRect(sigL-50,sigT-30,sigW+140,sigH+60);ctx.restore();
  // Three neon-letter panels (PUBLIC / MARKET / CENTER)
  ctx.save();ctx.shadowColor='#FF2A0A';ctx.shadowBlur=28;
  ctx.fillStyle='#FF4422';ctx.font='bold 22px Impact, Arial Black, sans-serif';ctx.textAlign='center';
  const tc=sigL+sigW/2;
  ctx.fillText('PUBLIC',tc,sigT+30);
  ctx.fillText('MARKET',tc,sigT+58);
  ctx.font='bold 17px Impact, Arial Black, sans-serif';ctx.fillStyle='#FF6644';
  ctx.fillText('CENTER',tc,sigT+82);
  ctx.restore();
  // Border neon tube
  ctx.save();ctx.shadowColor='#FF3010';ctx.shadowBlur=14;
  ctx.strokeStyle='#FF4428';ctx.lineWidth=2;ctx.strokeRect(sigL+5,sigT+5,sigW-10,sigH-10);ctx.restore();

  // ── CLOCK — right of sign, large round neon face ──
  const clkX=sigL+sigW+36,clkY=sigT+sigH/2+4;
  // Iron mounting bracket
  ctx.strokeStyle='#2A1A08';ctx.lineWidth=5;
  ctx.beginPath();ctx.moveTo(sigL+sigW,sigT+sigH/2);ctx.lineTo(clkX-26,clkY);ctx.stroke();
  ctx.save();ctx.shadowColor='#FF2010';ctx.shadowBlur=24;
  // Outer ring — red neon tube
  ctx.strokeStyle='#FF3A14';ctx.lineWidth=5;
  ctx.beginPath();ctx.arc(clkX,clkY,28,0,Math.PI*2);ctx.stroke();
  // Face
  ctx.fillStyle='#8C0808';ctx.beginPath();ctx.arc(clkX,clkY,25,0,Math.PI*2);ctx.fill();
  // Inner ring (second neon band)
  ctx.strokeStyle='#CC2A10';ctx.lineWidth=2;
  ctx.beginPath();ctx.arc(clkX,clkY,22,0,Math.PI*2);ctx.stroke();
  // Hour markers
  ctx.strokeStyle='#FFCCAA';ctx.lineWidth=2;
  for(let h=0;h<12;h++){
    const ha=(h/12)*Math.PI*2-Math.PI/2,r1=16,r2=h%3===0?11:14;
    ctx.beginPath();ctx.moveTo(clkX+Math.cos(ha)*r1,clkY+Math.sin(ha)*r1);ctx.lineTo(clkX+Math.cos(ha)*r2,clkY+Math.sin(ha)*r2);ctx.stroke();
  }
  // Hands (animated)
  const mA=frame*0.04,hA=frame*0.0033;
  ctx.strokeStyle='#FFFFFF';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(clkX,clkY);ctx.lineTo(clkX+Math.cos(hA-Math.PI/2)*14,clkY+Math.sin(hA-Math.PI/2)*14);ctx.stroke();
  ctx.lineWidth=2;
  ctx.beginPath();ctx.moveTo(clkX,clkY);ctx.lineTo(clkX+Math.cos(mA-Math.PI/2)*19,clkY+Math.sin(mA-Math.PI/2)*19);ctx.stroke();
  ctx.restore();

  // Red & white striped awning
  ctx.save();ctx.beginPath();ctx.rect(cx-64,base-30,128,22);ctx.clip();
  for(let i=0;i<14;i++){ctx.fillStyle=i%2===0?'#CC1010':'#F2F0EE';ctx.fillRect(cx-64+i*10,base-30,10,22);}
  ctx.restore();
  for(let i=0;i<12;i++){ctx.fillStyle='#AA0808';ctx.beginPath();ctx.arc(cx-58+i*10,base-8,5,0,Math.PI);ctx.fill();}

  // Market entrance
  ctx.fillStyle='#1C0C06';ctx.fillRect(cx-18,base-28,36,28);
  ctx.fillStyle='#0C0404';ctx.fillRect(cx-16,base-26,32,26);
  // Door light
  ctx.fillStyle='rgba(255,220,120,0.4)';ctx.fillRect(cx-16,base-26,32,26);

  ctx.textAlign='left';
}

function drawWinScene(){
  const nBase=625;

  // ── Deep psychedelic sky ──
  const sk=ctx.createLinearGradient(0,0,0,VH);
  sk.addColorStop(0,'#050210');sk.addColorStop(0.5,'#0a1830');sk.addColorStop(1,'#0e2040');
  ctx.fillStyle=sk;ctx.fillRect(0,0,VW,VH);

  // Aurora borealis ribbons (6 shifting sine-wave bands)
  for(let i=0;i<6;i++){
    const hue=(winFrame*2+i*60)%360;
    const yc=VH*0.12+i*VH*0.07+Math.sin(winFrame*0.04+i*1.1)*35;
    const bh=22+Math.sin(winFrame*0.06+i)*12;
    const ag=ctx.createLinearGradient(0,yc-bh,0,yc+bh);
    ag.addColorStop(0,'rgba(0,0,0,0)');
    ag.addColorStop(0.5,`hsla(${hue},100%,58%,0.14)`);
    ag.addColorStop(1,'rgba(0,0,0,0)');
    ctx.fillStyle=ag;ctx.fillRect(0,yc-bh,VW,bh*2);
  }

  // Rainbow-pulsing stars
  for(let i=0;i<80;i++){
    const hx=(i*137+59)%VW;const hy=(i*97+23)%(VH*0.65);
    const tw=0.3+0.7*Math.sin(winFrame*0.08+i*0.9);
    const sh=(winFrame*2+i*23)%360;
    ctx.fillStyle=`hsla(${sh},60%,90%,${tw})`;
    ctx.beginPath();ctx.arc(hx,hy,1+i%2*0.6,0,Math.PI*2);ctx.fill();
  }

  // City glow
  const cg=ctx.createLinearGradient(0,VH*0.62,0,VH*0.78);
  cg.addColorStop(0,'rgba(40,80,180,0)');cg.addColorStop(0.5,'rgba(60,100,220,0.2)');cg.addColorStop(1,'rgba(20,60,140,0)');
  ctx.fillStyle=cg;ctx.fillRect(0,VH*0.58,VW,VH*0.22);

  // Pike Place Market (left)
  drawPikePlace(88,nBase,winFrame);
  // Space Needle (centre)
  drawWinSpaceNeedle(VW/2,nBase);
  // Seattle Great Wheel (right)
  drawGreatWheel(390,nBase,winFrame);

  // Fireworks
  if(winFrame%32===0&&fireworks.length<16){
    fireworks.push({
      x:VW*0.06+Math.random()*VW*0.88,
      y:28+Math.random()*VH*0.40,
      col:[[255,70,50],[255,215,30],[60,255,120],[50,195,255],[255,70,200],[255,160,30],[160,80,255]][Math.floor(Math.random()*7)],
      t:0
    });
  }
  fireworks.forEach(fw=>{
    fw.t++;
    for(let i=0;i<14;i++){
      const a=(i/14)*Math.PI*2;
      for(let tr=0;tr<5;tr++){
        const r=fw.t*2.6-tr*4;if(r<0)continue;
        const al=Math.max(0,(1-fw.t/52)*(1-tr/5));
        ctx.fillStyle=`rgba(${fw.col[0]},${fw.col[1]},${fw.col[2]},${al})`;
        ctx.beginPath();ctx.arc(fw.x+Math.cos(a)*r,fw.y+Math.sin(a)*r,3-tr*0.4,0,Math.PI*2);ctx.fill();
      }
    }
  });
  fireworks=fireworks.filter(fw=>fw.t<56);

  // ── Orcas leaping on each side of the needle ──
  const orcaBase=nBase+8;  // "water surface" level
  const ljump=Math.abs(Math.sin(winFrame*0.06));       // left orca jump arc
  const rjump=Math.abs(Math.sin(winFrame*0.06+1.4));   // right orca, phase offset
  const lorcaY=orcaBase-ljump*110;
  const rorcaY=orcaBase-rjump*110;
  const lorcaTilt=Math.sin(winFrame*0.06)*0.5;  // body rotates with arc
  const rorcaTilt=-Math.sin(winFrame*0.06+1.4)*0.5;

  // Water splash at base for each orca
  for(let s=0;s<2;s++){
    const ox=s===0?52:VW-52;
    const splash=s===0?ljump:rjump;
    if(splash<0.15){
      for(let d=0;d<6;d++){
        const sa=(d/6)*Math.PI-Math.PI/2;const sr=(1-splash/0.15)*28;
        const sh=(winFrame*6+d*60)%360;
        ctx.fillStyle=`hsla(${sh},100%,70%,${(1-splash/0.15)*0.7})`;
        ctx.beginPath();ctx.arc(ox+Math.cos(sa)*sr,orcaBase+Math.sin(sa)*sr*0.4,3,0,Math.PI*2);ctx.fill();
      }
    }
  }

  ctx.save();ctx.translate(52,lorcaY);ctx.rotate(lorcaTilt-0.3);ctx.translate(-52,-lorcaY);
  drawOrca(52,lorcaY,false,winFrame);
  ctx.restore();
  ctx.save();ctx.translate(VW-52,rorcaY);ctx.rotate(rorcaTilt+0.3);ctx.translate(-(VW-52),-rorcaY);
  drawOrca(VW-52,rorcaY,true,winFrame+40);
  ctx.restore();

  // ── Large Jimothy dancing (smooth Canvas API — no pixelation) ──
  drawWinJimothy(VW/2,nBase,winFrame);

  // ── Confetti rain ──
  for(let i=0;i<30;i++){
    const ccx=((i*173+winFrame*2.7+i*winFrame*0.07)%VW);
    const ccy=((winFrame*1.8+i*67)%VH);
    const hue=(winFrame*4+i*12)%360;
    ctx.fillStyle=`hsl(${hue},100%,65%)`;
    const cw=5+i%3;ctx.fillRect(ccx,ccy,cw,cw+4);
  }

  // ── Score panel ──
  const panH=108;
  ctx.fillStyle='rgba(2,4,20,0.92)';ctx.fillRect(0,VH-panH,VW,panH);
  const borderHue=(winFrame*4)%360;
  ctx.strokeStyle=`hsl(${borderHue},100%,55%)`;ctx.lineWidth=2;
  ctx.strokeRect(0,VH-panH,VW,panH);

  const tb=Math.sin(winFrame*0.10)*2;
  const titleHue=(winFrame*3)%360;
  ctx.fillStyle=`hsl(${titleHue},100%,68%)`;
  ctx.font=`bold ${Math.round(26+tb)}px Courier New`;ctx.textAlign='center';
  ctx.fillText('🦝 JIMOTHY IS FULL! 🦝',VW/2,VH-panH+32);
  ctx.fillStyle='#88ddff';ctx.font='17px Courier New';
  ctx.fillText(`${score} bites collected`,VW/2,VH-panH+58);
  if(winFrame>160){
    ctx.fillStyle='rgba(160,185,255,0.75)';ctx.font='13px Courier New';
    ctx.fillText('tap / SPACE to go again',VW/2,VH-panH+80);
  }
  ctx.textAlign='left';
}

// ── LOOP ──
function loop(){
  update();
  if(won){
    drawWinScene();
  } else {
    drawBg();
    drawWorld();
    drawJim();
    drawHUD();
  }
  requestAnimationFrame(loop);
}

// ── INIT ──
function init(){
  food=FOOD_DEFS.map(f=>({...f,taken:false}));
  cans=CAN_DEFS.map(c=>({...c,searched:false}));
  jim={x:140,y:GY-JIM_H,vx:0,vy:0,onGround:true,facing:1,
       walkTick:0,walkFrame:0,digging:false,digTick:0,digTarget:null,
       jumpHeld:false,digHeld:false};
  camX=0;score=0;popups=[];frame=0;won=false;winFrame=0;fireworks=[];
  document.getElementById('share-btn').style.display='none';
  startBgMusic();
}

// ── MOBILE ──
function setupMobile(){
  // Always show on-screen buttons (touch or keyboard both work)
  function hold(id,prop){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();mob[prop]=true;
      if(audio&&audio.state==='suspended')audio.resume();},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();mob[prop]=false;},{passive:false});
    el.addEventListener('touchcancel',()=>{mob[prop]=false;});
    // Mouse fallback for desktop testing
    el.addEventListener('mousedown',e=>{mob[prop]=true;});
    el.addEventListener('mouseup',()=>{mob[prop]=false;});
  }
  hold('btn-l','l');hold('btn-r','r');hold('btn-j','j');hold('btn-d','d');
}

setupMobile();
init();
requestAnimationFrame(loop);
</script>
