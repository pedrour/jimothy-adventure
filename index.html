// ── SPRITE RENDERER ──
function px(rows,x,y,sc,flipH){
  const ox=flipH?x+rows[0].length*sc:x;
  for(let r=0;r<rows.length;r++){
    const row=rows[r];
    for(let c=0;c<row.length;c++){
      const k=row[c];if(k==='.')continue;
      const col=COL[k];if(!col)continue;
      ctx.fillStyle=col;
      const px=flipH?ox-(c+1)*sc:ox+c*sc;
      ctx.fillRect(px,y+r*sc,sc,sc);
    }
  }
}

// ── SOUND ──
function beep(freq,dur,vol,type){
  if(!audio)return;
  try{
    const o=audio.createOscillator(),g=audio.createGain();
    o.connect(g);g.connect(audio.destination);
    o.type=type||'triangle';o.frequency.value=freq;
    g.gain.setValueAtTime(vol,audio.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,audio.currentTime+dur);
    o.start();o.stop(audio.currentTime+dur);
  }catch(e){}
}
function sndJump(){beep(220,0.15,0.12,'sine');setTimeout(()=>beep(330,0.1,0.08,'sine'),60)}

function sndDig(){beep(80,0.2,0.1,'sawtooth');setTimeout(()=>beep(60,0.2,0.1,'sawtooth'),120)}
function sndWin(){[523,659,784,1047].forEach((f,i)=>setTimeout(()=>beep(f,0.25,0.15,'sine'),i*120))}

function doJump(){
  if(!jim.onGround)return;
  jim.vy=JUMP_VY;jim.onGround=false;
  sndJump();
  if(audio&&audio.state==='suspended')audio.resume();
}
function tryDig(){
  if(!jim.onGround)return;
  const cx=jim.x+JIM_W/2;
  for(const can of cans){
    if(can.searched)continue;
    const ccx=can.x+can.w/2;
    if(Math.abs(cx-ccx)<54&&jim.y+JIM_H>=can.y){
      jim.digging=true;jim.digTick=0;jim.digTarget=can;
      jim.vx=0;sndDig();
      if(audio&&audio.state==='suspended')audio.resume();
      return;
    }
  }
}

// ── BUILDING HELPERS (near background) ──
function drawCraftsman(sx,w,h){
  // 1920s Ballard craftsman bungalow
  ctx.fillStyle='#1e2e42';
  ctx.fillRect(sx,GY-h,w,h);
  // Gable roof
  ctx.fillStyle='#14202e';
  ctx.beginPath();ctx.moveTo(sx-13,GY-h);ctx.lineTo(sx+w/2,GY-h-h*0.40);ctx.lineTo(sx+w+13,GY-h);ctx.closePath();ctx.fill();
  // Dormer in roof (if wide enough)
  if(w>130){
    const dw=30,dh=20,dx=sx+w*0.58-15,dy=GY-h-h*0.26-dh;
    ctx.fillStyle='#1e2e42';ctx.fillRect(dx,dy,dw,dh);
    ctx.fillStyle='#14202e';
    ctx.beginPath();ctx.moveTo(dx-4,dy+dh);ctx.lineTo(dx+dw/2,dy);ctx.lineTo(dx+dw+4,dy+dh);ctx.closePath();ctx.fill();
    ctx.fillStyle='#2a4060';ctx.fillRect(dx+5,dy+4,dw-10,dh-7);
  }
  // Porch gable
  const pw=w*0.48;
  ctx.fillStyle='#12202e';
  ctx.beginPath();ctx.moveTo(sx-3,GY-h*0.44);ctx.lineTo(sx+pw/2,GY-h*0.44-20);ctx.lineTo(sx+pw+3,GY-h*0.44);ctx.closePath();ctx.fill();
  ctx.fillRect(sx-5,GY-h*0.44-2,pw+10,5);
  // Porch platform + columns
  ctx.fillStyle='#101c2a';
  ctx.fillRect(sx-5,GY-22,pw+10,6);
  ctx.fillRect(sx+4,GY-h*0.44,6,h*0.44-22);
  ctx.fillRect(sx+pw-8,GY-h*0.44,6,h*0.44-22);
  // Chimney
  ctx.fillStyle='#182636';ctx.fillRect(sx+w*0.70,GY-h-h*0.34,13,h*0.30);
  // Windows
  ctx.fillStyle='#2a4060';
  ctx.fillRect(sx+pw+10,GY-h+14,22,18);
  if(w>130) ctx.fillRect(sx+pw+40,GY-h+14,22,18);
  ctx.fillRect(sx+pw+10,GY-h*0.70+8,20,15);
  if(w>130) ctx.fillRect(sx+pw+38,GY-h*0.70+8,20,15);
}

}

  // Soft cloud wisps
  [0,340,680,1100,1500,1900].forEach((seed,i)=>{
    const cx=((seed-camX*0.01)%(VW+500))-250;
    const cy=48+i*12;

    ctx.beginPath();ctx.ellipse(cx-60,cy+11,95,17,0,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.ellipse(cx+75,cy+7,85,15,0,0,Math.PI*2);ctx.fill();
  });

  // OLYMPIC MOUNTAINS (west, parallax 1.5%)
  const olX=-camX*0.015;
  [{dx:55,h:100},{dx:138,h:122},{dx:222,h:92},{dx:310,h:135},{dx:400,h:108},{dx:485,h:84},{dx:572,h:118},{dx:658,h:96},{dx:748,h:80}].forEach(({dx,h})=>{
    const ox=olX+dx;
    if(ox<-90||ox>VW+90) return;
    ctx.fillStyle='#253848';
    ctx.beginPath();ctx.moveTo(ox-70,GY+8);ctx.lineTo(ox,GY-h);ctx.lineTo(ox+70,GY+8);ctx.closePath();ctx.fill();
    ctx.fillStyle='#354858';
    ctx.beginPath();ctx.moveTo(ox-42,GY+8);ctx.lineTo(ox,GY-h);ctx.lineTo(ox+45,GY+8);ctx.closePath();ctx.fill();
    // Snow caps
    ctx.fillStyle='#7a9aaa';
    ctx.beginPath();ctx.moveTo(ox,GY-h);ctx.lineTo(ox-18,GY-h+28);ctx.lineTo(ox+15,GY-h+26);ctx.closePath();ctx.fill();
    ctx.fillStyle='#aabfca';
    ctx.beginPath();ctx.moveTo(ox,GY-h);ctx.lineTo(ox-8,GY-h+14);ctx.lineTo(ox+7,GY-h+12);ctx.closePath();ctx.fill();
  });

  // MOUNT RAINIER (SE, parallax 2%) — dominant, iconic stratovolcano

    ctx.quadraticCurveTo(rX-220,GY-115, rX-55,GY-238);
    ctx.quadraticCurveTo(rX,GY-265, rX+60,GY-232);
    ctx.quadraticCurveTo(rX+218,GY-112, rX+360,GY+10);
    ctx.closePath();ctx.fill();
    // Mid-tone layer (atmosphere)
    ctx.fillStyle='#344a5e';
    ctx.beginPath();
    ctx.moveTo(rX-238,GY+10);
    ctx.quadraticCurveTo(rX-148,GY-108, rX-42,GY-238);
    ctx.quadraticCurveTo(rX+2,GY-265, rX+55,GY-230);
    ctx.quadraticCurveTo(rX+155,GY-104, rX+265,GY+10);
    ctx.closePath();ctx.fill();
    // Lit NW face
    ctx.fillStyle='#3e566a';
    ctx.beginPath();
    ctx.moveTo(rX-130,GY+10);
    ctx.quadraticCurveTo(rX-68,GY-105, rX-8,GY-258);
    ctx.quadraticCurveTo(rX+10,GY-265, rX+52,GY-228);
    ctx.quadraticCurveTo(rX+110,GY-100, rX+185,GY+10);
    ctx.closePath();ctx.fill();

    // SNOWFIELDS — covers upper 40% of mountain
    ctx.fillStyle='#d8e8ee';
    ctx.beginPath();
    ctx.moveTo(rX,GY-265); // summit
    ctx.lineTo(rX-14,GY-254);
    ctx.quadraticCurveTo(rX-40,GY-228, rX-72,GY-200);
    ctx.lineTo(rX-90,GY-185);
    ctx.quadraticCurveTo(rX-48,GY-172, rX-8,GY-180);
    ctx.quadraticCurveTo(rX+22,GY-178, rX+55,GY-184);
    ctx.lineTo(rX+82,GY-196);
    ctx.quadraticCurveTo(rX+58,GY-226, rX+22,GY-254);
    ctx.closePath();ctx.fill();
    // Emmons glacier (largest, right side)
    ctx.fillStyle='#b2caD4';
    ctx.beginPath();
    ctx.moveTo(rX+45,GY-224);
    ctx.quadraticCurveTo(rX+80,GY-195, rX+96,GY-160);
    ctx.lineTo(rX+78,GY-155);
    ctx.quadraticCurveTo(rX+62,GY-188, rX+30,GY-218);
    ctx.closePath();ctx.fill();
    // Nisqually glacier (south)
    ctx.beginPath();
    ctx.moveTo(rX-5,GY-180);
    ctx.quadraticCurveTo(rX+2,GY-155, rX+4,GY-130);
    ctx.lineTo(rX-12,GY-128);
    ctx.quadraticCurveTo(rX-18,GY-152, rX-20,GY-176);
    ctx.closePath();ctx.fill();
    // Carbon glacier (left side)
    ctx.beginPath();
    ctx.moveTo(rX-60,GY-202);
    ctx.quadraticCurveTo(rX-82,GY-178, rX-90,GY-155);
    ctx.lineTo(rX-74,GY-150);
    ctx.quadraticCurveTo(rX-64,GY-173, rX-44,GY-198);
    ctx.closePath();ctx.fill();
    // Summit bright highlight
    ctx.fillStyle='#eef5f8';
    ctx.beginPath();ctx.moveTo(rX,GY-265);ctx.lineTo(rX-9,GY-248);ctx.lineTo(rX+10,GY-245);ctx.closePath();ctx.fill();
  }

  // SEATTLE SKYLINE + SPACE NEEDLE (parallax 6%)
  const snX=570-camX*0.06;
  if(snX>-450&&snX<VW+450){
    // Downtown buildings
    ctx.fillStyle='#162030';
    [[-265,82,40],[-218,106,36],[-174,138,44],[-120,122,38],[-68,92,40],[-18,96,42],[38,112,36],[84,80,40],[132,92,36]].forEach(([dx,bh,bw])=>{
      const bx=snX+dx;
      if(bx<-55||bx>VW+55) return;
      ctx.fillRect(bx,GY-bh,bw,bh);
      ctx.fillStyle='rgba(140,195,225,0.10)';
      for(let wy=GY-bh+6;wy<GY-5;wy+=10) ctx.fillRect(bx+3,wy,bw-6,6);
      ctx.fillStyle='#162030';
    });

    // SPACE NEEDLE — proper iconic proportions
    if(snX>-150&&snX<VW+150){
      ctx.save();
      ctx.translate(snX,GY-5);
      const nc='#122038';
      ctx.fillStyle=nc;

      // Hourglass tripod legs — the signature curved shape
      ctx.beginPath();
      ctx.moveTo(-50,0);
      ctx.bezierCurveTo(-56,-20,-50,-58,-15,-90);
      ctx.lineTo(-7,-90);
      ctx.bezierCurveTo(-42,-58,-48,-20,-42,0);
      ctx.closePath();ctx.fill();

      ctx.beginPath();
      ctx.moveTo(50,0);
      ctx.bezierCurveTo(56,-20,50,-58,15,-90);
      ctx.lineTo(7,-90);
      ctx.bezierCurveTo(42,-58,48,-20,42,0);
      ctx.closePath();ctx.fill();

      // Base ground ring
      ctx.fillRect(-54,-5,108,6);

      // Main shaft (narrows from legs to saucer)
      ctx.fillRect(-8,-168,16,78);

      // Saucer floor — wide overhang (the UFO part)
      ctx.beginPath();ctx.ellipse(0,-168,60,13,0,0,Math.PI*2);ctx.fill();

      // Restaurant body
      ctx.fillRect(-54,-192,108,24);

      // Restaurant top curve
      ctx.beginPath();ctx.ellipse(0,-192,54,11,0,0,Math.PI*2);ctx.fill();

      // Glass window ring (slightly lighter)
      ctx.fillStyle='#1c3258';
      ctx.fillRect(-50,-190,100,18);
      ctx.fillStyle=nc;

      // Halo ring / antenna base
      ctx.beginPath();ctx.ellipse(0,-204,36,7,0,0,Math.PI*2);ctx.fill();

      // Upper shaft
      ctx.fillRect(-6,-224,12,20);

      // Observation bubble
      ctx.fillRect(-10,-232,20,10);

      // SPIRE — thin, tall
      ctx.beginPath();
      ctx.moveTo(0,-285);
      ctx.lineTo(-4,-232);
      ctx.lineTo(4,-232);
      ctx.closePath();ctx.fill();

      // Red warning light at tip
      ctx.fillStyle='#cc2233';
      ctx.beginPath();ctx.arc(0,-285,3.5,0,Math.PI*2);ctx.fill();

      ctx.restore();
    }

    // GREAT WHEEL (Pier 57, parallax 5%)
    const gwX=VW*0.84-camX*0.05;
    if(gwX>-130&&gwX<VW+130){
      const gwr=76,gwCY=GY-gwr-10;
      ctx.fillStyle='#162030';
      // Ground base
      ctx.fillRect(gwX-64,GY-22,128,22);
      // Center column
      ctx.fillRect(gwX-10,gwCY,20,gwr);
      // Angled support struts
      ctx.beginPath();ctx.moveTo(gwX-8,gwCY+gwr);ctx.lineTo(gwX-58,GY-18);ctx.lineTo(gwX-48,GY-18);ctx.lineTo(gwX,gwCY+gwr-10);ctx.closePath();ctx.fill();
      ctx.beginPath();ctx.moveTo(gwX+8,gwCY+gwr);ctx.lineTo(gwX+58,GY-18);ctx.lineTo(gwX+48,GY-18);ctx.lineTo(gwX,gwCY+gwr-10);ctx.closePath();ctx.fill();
      // Outer rim
      ctx.strokeStyle='#162030';ctx.lineWidth=7;
      ctx.beginPath();ctx.arc(gwX,gwCY,gwr,0,Math.PI*2);ctx.stroke();
      // Inner ring
      ctx.lineWidth=3;ctx.strokeStyle='#1e2e44';
      ctx.beginPath();ctx.arc(gwX,gwCY,gwr*0.52,0,Math.PI*2);ctx.stroke();
      // Spokes (16)
      ctx.strokeStyle='#162030';ctx.lineWidth=2;
      for(let a=0;a<16;a++){
        const ang=a/16*Math.PI*2;
        ctx.beginPath();ctx.moveTo(gwX,gwCY);
        ctx.lineTo(gwX+Math.cos(ang)*gwr,gwCY+Math.sin(ang)*gwr);ctx.stroke();
      }
      // Gondolas
      ctx.fillStyle='#1e2e44';
      for(let a=0;a<16;a++){
        const ang=a/16*Math.PI*2;
        ctx.fillRect(gwX+Math.cos(ang)*(gwr-5)-5,gwCY+Math.sin(ang)*(gwr-5)-5,10,9);
      }
    }
  }

  // BALLARD BUILDINGS near background (parallax 20%)
  const bgOff=-camX*0.20;
  BLDG_LAYOUT.forEach(b=>{
    const sx=b.x+bgOff;
    if(sx+b.w+25<0||sx-25>VW) return;
    if(b.type==='craftsman') drawCraftsman(sx,b.w,b.h);
    else if(b.type==='townhome') drawTownhome(sx,b.w,b.h);
    else drawApartment(sx,b.w,b.h);
  });

  // Low horizon fog (Seattle signature)
  const fog=ctx.createLinearGradient(0,GY-90,0,GY);
  fog.addColorStop(0,'rgba(80,122,148,0)');
  fog.addColorStop(1,'rgba(80,122,148,0.22)');
  ctx.fillStyle=fog;ctx.fillRect(0,GY-90,VW,90);
}

function drawFence(p){
  const sx=p.x-camX;
  if(sx+p.w<-10||sx>VW+10)return;

  // Shadow under fence
  ctx.fillStyle='rgba(0,0,0,0.22)';
  ctx.fillRect(sx+4,p.y+p.h-3,p.w,6);

  // Posts first (behind boards)
  for(let px=sx;px<=sx+p.w+2;px+=58){
    // Post body — weathered cedar, slightly darker than boards
    ctx.fillStyle='#4e3018';ctx.fillRect(px-6,p.y-14,12,p.h+14);
    // Post grain
    ctx.fillStyle='#3e2410';ctx.fillRect(px-4,p.y-8,3,p.h+6);
    ctx.fillRect(px+1,p.y-4,2,p.h+2);
    // Post cap (pointed)
    ctx.fillStyle='#3e2410';
    ctx.beginPath();ctx.moveTo(px,p.y-22);ctx.lineTo(px-6,p.y-14);ctx.lineTo(px+6,p.y-14);ctx.closePath();ctx.fill();
    ctx.fillStyle='#5e3820';
    ctx.beginPath();ctx.moveTo(px,p.y-20);ctx.lineTo(px-4,p.y-14);ctx.lineTo(px+4,p.y-14);ctx.closePath();ctx.fill();
  }

  // Horizontal rails (behind boards)
  ctx.fillStyle='#5a3820';ctx.fillRect(sx,p.y+4,p.w,8); // top rail
  ctx.fillRect(sx,p.y+p.h-12,p.w,8); // bottom rail
  ctx.fillStyle='#4a2e16';ctx.fillRect(sx,p.y+4,p.w,2); // rail shadow top
  ctx.fillRect(sx,p.y+p.h-12,p.w,2);

  // Vertical boards (cedar planks)
  for(let bx=sx+2;bx<sx+p.w-4;bx+=14){
    // Main board — weathered gray-brown cedar
    ctx.fillStyle='#8a5e38';ctx.fillRect(bx,p.y+2,12,p.h-4);
    // Board highlight (left edge catches light)
    ctx.fillStyle='#9a6840';ctx.fillRect(bx,p.y+2,3,p.h-4);
    // Board shadow (right edge)
    ctx.fillStyle='#6a4828';ctx.fillRect(bx+10,p.y+2,2,p.h-4);
    // Wood grain lines
    ctx.fillStyle='#7a5230';
    ctx.fillRect(bx+4,p.y+10,1,p.h-20);
    ctx.fillRect(bx+8,p.y+16,1,p.h-30);
    // Knot in wood (occasionally)
    if(Math.floor((bx-sx)/14)%5===2){
      ctx.fillStyle='#5a3a20';
      ctx.beginPath();ctx.ellipse(bx+6,p.y+p.h*0.4,4,3,0,0,Math.PI*2);ctx.fill();
    }
  }
}

  ctx.fillStyle='#327830';

  ctx.beginPath();ctx.moveTo(sx,baseY-h);ctx.lineTo(sx-8,baseY-th+10);ctx.lineTo(sx+8,baseY-th+10);ctx.closePath();ctx.fill();
  ctx.fillStyle='#2a5a28';

}

function drawTrashCan(can){
  const sx=can.x-camX;
  if(sx+can.w<0||sx>VW)return;
  const {w,h}=can;const y=can.y;
  if(!can.searched){
    ctx.fillStyle='#58686e';ctx.fillRect(sx+2,y+8,w-4,h-8);
    ctx.fillStyle='#48585e';
    for(let ry=y+14;ry<y+h-4;ry+=12)ctx.fillRect(sx+2,ry,w-4,2);
    ctx.fillStyle='#384850';ctx.fillRect(sx-2,y,w+4,9);ctx.fillRect(sx,y-5,w,7);
    ctx.strokeStyle='#788a90';ctx.lineWidth=2.5;
    ctx.beginPath();ctx.arc(sx+w/2,y-1,7,Math.PI,0);ctx.stroke();
  } else {
    ctx.fillStyle='#58686e';ctx.fillRect(sx+2,y+14,w-4,h-14);
    ctx.fillStyle='#48585e';for(let ry=y+20;ry<y+h-4;ry+=12)ctx.fillRect(sx+2,ry,w-4,2);
    ctx.save();ctx.translate(sx+2,y+9);ctx.rotate(-0.5);
    ctx.fillStyle='#384850';ctx.fillRect(0,0,w+4,9);ctx.restore();
    ctx.fillStyle='#3a2818';ctx.beginPath();ctx.ellipse(sx+w/2,y+10,12,6,0,0,Math.PI*2);ctx.fill();
  }
  // proximity hint
  if(!can.searched){
    const cx=jim.x+JIM_W/2,ccx=can.x+can.w/2;

      ctx.fillStyle='rgba(255,220,80,0.9)';ctx.font='bold 16px Courier New';ctx.textAlign='center';
      ctx.fillText('S / ⬇',sx+w/2,y-8);ctx.textAlign='left';
    }
  }
}

function drawFood(f){
  if(f.taken)return;
  const sx=f.x-camX;
  if(sx<-30||sx>VW+30)return;
  const bob=Math.sin(frame*0.07+f.x*0.008)*3;
  const fy=f.y+bob;
  switch(f.type){
    case 'fish':
      ctx.fillStyle='#88aacc';ctx.beginPath();ctx.ellipse(sx,fy-8,13,6,0,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#6688aa';ctx.beginPath();ctx.moveTo(sx-13,fy-8);ctx.lineTo(sx-22,fy-14);ctx.lineTo(sx-22,fy-2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx+8,fy-9,2.5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#111';ctx.beginPath();ctx.arc(sx+9,fy-9,1.2,0,Math.PI*2);ctx.fill();
      break;
    case 'pizza':
      ctx.fillStyle='#cc8830';ctx.beginPath();ctx.moveTo(sx,fy-18);ctx.lineTo(sx-15,fy+2);ctx.lineTo(sx+15,fy+2);ctx.closePath();ctx.fill();
      ctx.fillStyle='#dd3a1a';ctx.beginPath();ctx.moveTo(sx,fy-15);ctx.lineTo(sx-12,fy+0);ctx.lineTo(sx+12,fy+0);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ffbb44';ctx.beginPath();ctx.arc(sx-3,fy-8,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(sx+6,fy-12,2,0,Math.PI*2);ctx.fill();
      break;
    case 'apple':
      ctx.fillStyle='#bb2222';ctx.beginPath();ctx.arc(sx,fy-9,11,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#dd3333';ctx.beginPath();ctx.arc(sx-3,fy-10,8,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#5a3810';ctx.fillRect(sx-1,fy-21,2,7);
      ctx.fillStyle='#2a6018';ctx.beginPath();ctx.ellipse(sx+5,fy-20,6,3,0.5,0,Math.PI*2);ctx.fill();
      break;
    case 'coffee':
      ctx.fillStyle='#f0e0c8';ctx.fillRect(sx-9,fy-18,18,18);
      ctx.fillStyle='#3a2010';ctx.fillRect(sx-7,fy-14,14,10);
      ctx.strokeStyle='#f0e0c8';ctx.lineWidth=2.5;
      ctx.beginPath();ctx.arc(sx+12,fy-12,6,-0.9,0.9);ctx.stroke();
      ctx.strokeStyle='rgba(210,210,200,0.5)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(sx-2,fy-19);ctx.quadraticCurveTo(sx-5,fy-25,sx-2,fy-30);ctx.stroke();
      ctx.beginPath();ctx.moveTo(sx+3,fy-19);ctx.quadraticCurveTo(sx+6,fy-25,sx+3,fy-30);ctx.stroke();
      break;
    case 'burger':
      ctx.fillStyle='#cc8830';ctx.beginPath();ctx.arc(sx,fy-14,13,Math.PI,0);ctx.fill();
      ctx.fillStyle='#dd3a1a';ctx.fillRect(sx-11,fy-11,22,4);
      ctx.fillStyle='#4a8a18';ctx.fillRect(sx-11,fy-8,22,3);
      ctx.fillStyle='#cc8830';ctx.fillRect(sx-12,fy-6,24,6);
      ctx.beginPath();ctx.arc(sx,fy-6,12,0,Math.PI);ctx.fill();
      break;
  }
}

function drawGround(){
  // Grass strip (lush Seattle green)
  const grassGrad=ctx.createLinearGradient(0,GY-8,0,GY+14);
  grassGrad.addColorStop(0,'#388830');grassGrad.addColorStop(1,'#2a6820');
  ctx.fillStyle=grassGrad;ctx.fillRect(0,GY-8,VW,22);
  // Sidewalk
  const swGrad=ctx.createLinearGradient(0,GY+14,0,GY+32);
  swGrad.addColorStop(0,'#807060');swGrad.addColorStop(1,'#6a5a4c');
  ctx.fillStyle=swGrad;ctx.fillRect(0,GY+14,VW,18);
  // Sidewalk cracks
  ctx.fillStyle='#6a5a4a';
  for(let gx=(-camX)%120;gx<VW;gx+=120) ctx.fillRect(gx,GY+14,1,18);
  // Soil / road
  ctx.fillStyle='#3a2e22';ctx.fillRect(0,GY+32,VW,VH-GY-32);
  // Grass tufts + moss (Seattle)
  ctx.fillStyle='#2a6825';
  const off=(-camX)%32;
  for(let gx=off;gx<VW;gx+=32){
    const idx=Math.floor((gx+camX)/32);
    if(idx%4===0){ctx.fillRect(gx,GY-10,3,10);ctx.fillRect(gx+6,GY-13,2,13);ctx.fillRect(gx+11,GY-8,3,8);}
    else if(idx%4===2){ctx.fillRect(gx+2,GY-11,2,11);ctx.fillRect(gx+8,GY-7,3,7);}
  }
  // Moss patches on sidewalk
  ctx.fillStyle='rgba(50,100,40,0.25)';
  for(let gx=(-camX*0.5)%180;gx<VW;gx+=180)
    ctx.fillRect(gx,GY+15,40,6);
}

function drawWorld(){
  // Background trees (parallax 22%) — organic silhouettes behind buildings
  TREE_XS.forEach(wx=>{
    const sx=wx-camX*0.22;
    if(sx<-120||sx>VW+120)return;
    const bY=GY;
    if(Math.floor(wx/400)%2===0){
      const h=168;
      ctx.fillStyle='#0d1f0e';
      ctx.beginPath();
      ctx.moveTo(sx,bY-h);
      ctx.bezierCurveTo(sx+10,bY-h+22,sx+40,bY-h*.67,sx+46,bY-h*.61);
      ctx.quadraticCurveTo(sx+37,bY-h*.55,sx+44,bY-h*.51);
      ctx.bezierCurveTo(sx+52,bY-h*.44,sx+54,bY-h*.37,sx+50,bY-h*.30);
      ctx.quadraticCurveTo(sx+56,bY-h*.24,sx+56,bY-h*.22);
      ctx.lineTo(sx+6,bY-6);ctx.lineTo(sx-6,bY-6);
      ctx.lineTo(sx-56,bY-h*.22);
      ctx.quadraticCurveTo(sx-56,bY-h*.24,sx-50,bY-h*.30);
      ctx.bezierCurveTo(sx-54,bY-h*.37,sx-52,bY-h*.44,sx-44,bY-h*.51);
      ctx.quadraticCurveTo(sx-37,bY-h*.55,sx-46,bY-h*.61);
      ctx.bezierCurveTo(sx-40,bY-h*.67,sx-10,bY-h+22,sx,bY-h);
      ctx.closePath();ctx.fill();
    } else {
      const cy=bY-148;
      ctx.fillStyle='#0d1e0d';
      [[0,0,48,42],[-36,15,32,27],[36,15,32,27],[-22,-24,26,22],[24,-22,24,20],
       [0,-34,18,16],[-14,30,19,16],[16,30,17,15]
      ].forEach(([dx,dy,rx,ry])=>{
        ctx.beginPath();ctx.ellipse(sx+dx,cy+dy,rx,ry,0,0,Math.PI*2);ctx.fill();
      });
    }
  });

  // In-world trees (at branch positions)
  TREE_XS.forEach(wx=>drawTree(wx));
  drawGround();

  // Fences and branches
  PLATFORMS.forEach(p=>{
    if(p.type==='fence')drawFence(p);
    else if(p.type==='branch')drawBranch(p);
  });

  // Trash cans
  cans.forEach(drawTrashCan);
  // Food
  food.forEach(drawFood);
}

// ── JIMOTHY DRAW ──
function drawJim(){
  const sx=jim.x-camX;
  const sy=jim.y;
  const flip=jim.facing<0;

  if(jim.digging){
    // Show upside-down (diving into can)
    ctx.save();
    const dig_offset=Math.min(jim.digTick*0.4,JIM_H*0.65);
    ctx.translate(sx+JIM_W/2,sy+JIM_H/2);ctx.scale(flip?-1:1,1);
    px(JDG,-JIM_W/2,-JIM_H/2+dig_offset,SC);
    ctx.restore();
    return;
  }

  let sprite;
  if(!jim.onGround) sprite=JJP;
  else if(jim.vx!==0) sprite=(jim.walkFrame===0?JW1:JW2);
  else sprite=JW1;

  ctx.save();
  ctx.translate(sx+JIM_W/2,0);
  ctx.scale(flip?-1:1,1);
  px(sprite,-JIM_W/2,sy,SC);
  ctx.restore();
}

// ── HUD ──
function drawHUD(){
  // Score
  document.getElementById('scoretxt').textContent=`🍖 ${score} bites`;

  // Collected / total
  const got=food.filter(f=>f.taken).length+cans.filter(c=>c.searched).length;
  const tot=food.length+cans.length;
  ctx.fillStyle='rgba(0,0,0,0.55)';ctx.fillRect(6,6,170,28);
  ctx.fillStyle='#ffcc44';ctx.font='bold 18px Courier New';
  ctx.fillText(`found ${got}/${tot}`,12,22);

  // Popups
  popups=popups.filter(p=>{
    p.y+=p.vy;p.alpha-=0.022;
    if(p.alpha<=0)return false;
    ctx.fillStyle=`rgba(255,220,60,${p.alpha})`;
    ctx.font='bold 17px Courier New';ctx.textAlign='center';
    ctx.fillText(p.text,p.x-camX,p.y);ctx.textAlign='left';
    return true;
  });

  // Win message
  if(won){
    ctx.fillStyle='rgba(0,0,0,0.7)';ctx.fillRect(VW/2-220,VH/2-50,440,100);
    ctx.fillStyle='#ffcc44';ctx.font='bold 40px Courier New';ctx.textAlign='center';
    ctx.fillText('🦝 Jimothy is FULL! Great scavenge! 🦝',VW/2,VH/2-18);
    ctx.fillStyle='#88bbff';ctx.font='22px Courier New';
    ctx.fillText(`Total: ${score} bites  |  Press SPACE to play again`,VW/2,VH/2+28);
    ctx.textAlign='left';
  }

  // Controls reminder (fades after 8s)
  if(frame<480){
    const a=Math.max(0,(480-frame)/180);
    ctx.fillStyle=`rgba(120,180,255,${a*0.9})`;ctx.font='19px Courier New';ctx.textAlign='center';
    ctx.fillText('← → to move  |  SPACE to jump  |  S near trash to rummage',VW/2,VH-18);
    ctx.textAlign='left';
  }
}

// ── PHYSICS ──
function update(){
  frame++;

  // Win → only listen for restart
  if(won){
    if(keys['Space']||mob.j)init();
    return;
  }

  // Digging
  if(jim.digging){
    jim.digTick++;
    if(jim.digTick>=80){
      const pts=12+Math.floor(Math.random()*18);
      score+=pts;
      popups.push({x:jim.digTarget.x+jim.digTarget.w/2,y:jim.digTarget.y-10,text:`+${pts} bites!`,alpha:1,vy:-1.4});
      jim.digTarget.searched=true;
      jim.digging=false;jim.digTarget=null;
      sndCollect();
    }
    return;
  }

  // Horizontal input
  const left=keys['ArrowLeft']||keys['KeyA']||mob.l;
  const right=keys['ArrowRight']||keys['KeyD']||mob.r;
  const jumpPressed=keys['Space']||keys['ArrowUp']||keys['KeyW']||mob.j;
  const digPressed=keys['ArrowDown']||keys['KeyS']||mob.d;

  if(left){jim.vx=Math.max(jim.vx-1.2,-WALK_SPD);}
  else if(right){jim.vx=Math.min(jim.vx+1.2,WALK_SPD);}
  else{jim.vx*=0.72;}
  if(Math.abs(jim.vx)<0.1)jim.vx=0;

  if(jim.vx<0)jim.facing=-1;
  else if(jim.vx>0)jim.facing=1;

  // Walk animation
  if(jim.onGround&&jim.vx!==0){
    jim.walkTick++;
    if(jim.walkTick>=8){jim.walkTick=0;jim.walkFrame^=1;}
  }

  // Jump
  if(jumpPressed&&jim.onGround&&!jim.jumpHeld){
    doJump();jim.jumpHeld=true;
  }
  if(!jumpPressed)jim.jumpHeld=false;

  // Dig
  if(digPressed&&!jim.digHeld){jim.digHeld=true;tryDig();}
  if(!digPressed)jim.digHeld=false;

  // Gravity
  jim.vy+=GRAVITY;

  // Move
  const prevY=jim.y;
  jim.x+=jim.vx;
  jim.y+=jim.vy;

  // World bounds
  if(jim.x<0){jim.x=0;jim.vx=0;}
  if(jim.x+JIM_W>WORLD_W){jim.x=WORLD_W-JIM_W;jim.vx=0;}

  // Platform collisions
  jim.onGround=false;
  PLATFORMS.forEach(p=>{
    // Top landing
    if(jim.x+JIM_W>p.x&&jim.x<p.x+p.w){
      if(prevY+JIM_H<=p.y&&jim.y+JIM_H>p.y&&jim.vy>0){
        jim.y=p.y-JIM_H;jim.vy=0;jim.onGround=true;
      }
    }
    // Side blocking (only for fences, not branches/ground)
    if(p.type==='fence'&&jim.y+JIM_H>p.y){
      // Left wall
      if(jim.x+JIM_W>p.x&&jim.x+JIM_W<p.x+8&&jim.vx>0){jim.x=p.x-JIM_W;jim.vx=0;}
      // Right wall
      if(jim.x<p.x+p.w&&jim.x>p.x+p.w-8&&jim.vx<0){jim.x=p.x+p.w;jim.vx=0;}
    }
  });

  // Fell below world
  if(jim.y>GY+100){jim.y=GY-JIM_H;jim.vy=0;jim.onGround=true;}

  // Food collection
  const jcx=jim.x+JIM_W/2,jcy=jim.y+JIM_H/2;
  food.forEach(f=>{
    if(f.taken)return;
    const dx=jcx-f.x,dy=jcy-f.y;
    if(Math.sqrt(dx*dx+dy*dy)<32){
      f.taken=true;score+=f.pts;
      popups.push({x:f.x,y:f.y-10,text:`+${f.pts}`,alpha:1,vy:-1.6});
      sndCollect();
      if(audio&&audio.state==='suspended')audio.resume();
    }
  });

  // Camera
  const targetCamX=jim.x-VW*0.35;
  camX+=(targetCamX-camX)*0.1;
  camX=Math.max(0,Math.min(WORLD_W-VW,camX));

  // Win check
  const allFood=food.every(f=>f.taken);
  const allCans=cans.every(c=>c.searched);
  if(allFood&&allCans&&!won){won=true;sndWin();}
}

// ── LOOP ──
function loop(){
  update();
  drawBg();
  drawWorld();
  drawJim();
  drawHUD();
  requestAnimationFrame(loop);
}

// ── INIT ──
function init(){
  food=FOOD_DEFS.map(f=>({...f,taken:false}));
  cans=CAN_DEFS.map(c=>({...c,searched:false}));
  jim={x:140,y:GY-JIM_H,vx:0,vy:0,onGround:true,facing:1,
       walkTick:0,walkFrame:0,digging:false,digTick:0,digTarget:null,
       jumpHeld:false,digHeld:false};
  camX=0;score=0;popups=[];frame=0;won=false;
}

// ── MOBILE ──
function setupMobile(){
  if(!('ontouchstart' in window||navigator.maxTouchPoints>0))return;
  document.getElementById('mob').style.display='flex';
  document.getElementById('hint').style.display='none';

  function hold(id,prop){
    const el=document.getElementById(id);
    el.addEventListener('touchstart',e=>{e.preventDefault();mob[prop]=true;
      if(audio&&audio.state==='suspended')audio.resume();},{passive:false});
    el.addEventListener('touchend',e=>{e.preventDefault();mob[prop]=false;},{passive:false});
    el.addEventListener('touchcancel',()=>{mob[prop]=false;});
  }
  hold('btn-l','l');hold('btn-r','r');hold('btn-j','j');hold('btn-d','d');
}

setupMobile();
init();
requestAnimationFrame(loop);
</script>
